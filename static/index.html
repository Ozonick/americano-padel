<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Super Americano 🎾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surf:#1a1a1a; --surf2:#222; --surf3:#2a2a2a;
  --brd:rgba(255,255,255,0.08); --brd2:rgba(255,255,255,0.14);
  --txt:#f0f0f0; --txt2:#888; --txt3:#444;
  --green:#4cd964; --green-d:rgba(76,217,100,0.12);
  --blue:#0a84ff;  --blue-d:rgba(10,132,255,0.12);
  --amber:#ffaa00; --amber-d:rgba(255,170,0,0.12);
  --red:#ff453a;   --red-d:rgba(255,69,58,0.12);
  --r:10px; --rsm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input{font-family:'DM Sans',sans-serif}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--brd);
  position:sticky;top:0;background:rgba(15,15,15,.94);backdrop-filter:blur(14px);z-index:100}
.hdr-logo{width:34px;height:34px;background:var(--green);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr-name{font-size:16px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--txt2)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.role-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.role-admin{background:var(--green-d);color:var(--green)}
.role-viewer{background:var(--surf2);color:var(--txt2)}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--txt3);flex-shrink:0}
.ws-dot.ok{background:var(--green)}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 61px)}
.sidebar{width:270px;min-width:270px;border-right:1px solid var(--brd);padding:18px 14px;
  overflow-y:auto;position:sticky;top:61px;height:calc(100vh - 61px)}
.main{flex:1;padding:20px;overflow-y:auto;max-width:900px}

/* ── SIDEBAR ── */
.s-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--txt3);
  text-transform:uppercase;margin-bottom:10px;padding-left:2px}
.s-sec{margin-bottom:22px}
.nav-btn{width:100%;text-align:left;padding:9px 12px;background:transparent;
  border:none;border-radius:var(--rsm);color:var(--txt2);font-size:14px;
  display:flex;align-items:center;gap:10px;transition:all .15s;margin-bottom:2px}
.nav-btn:hover{background:var(--surf2);color:var(--txt)}
.nav-btn.active{background:var(--surf3);color:var(--txt);font-weight:500}
.nav-icon{font-size:16px;width:20px;text-align:center}
.param-row{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:var(--surf2);border-radius:var(--rsm);margin-bottom:5px}
.param-lbl{font-size:13px;color:var(--txt2)}
.p-in{width:58px;background:var(--surf3);border:1px solid var(--brd2);border-radius:5px;
  color:var(--txt);font-family:'DM Mono',monospace;font-size:13px;font-weight:500;
  text-align:center;padding:4px;outline:none}
.p-in:focus{border-color:var(--green)}
.hint-box{background:var(--green-d);border:1px solid rgba(76,217,100,.2);
  border-radius:var(--rsm);padding:10px 12px;font-size:12px;color:var(--green);margin-top:8px;line-height:1.6}
.btn-main{width:100%;padding:10px;background:var(--green);border:none;border-radius:var(--r);
  color:#000;font-size:14px;font-weight:600;margin-top:6px;transition:opacity .15s}
.btn-main:hover{opacity:.85}
.btn-sec{width:100%;padding:8px;background:var(--surf2);border:1px solid var(--brd);
  border-radius:var(--rsm);color:var(--txt2);font-size:13px;margin-top:5px;transition:all .15s}
.btn-sec:hover{background:var(--surf3);color:var(--txt)}
.btn-danger{width:100%;padding:8px;background:var(--red-d);border:1px solid rgba(255,69,58,.2);
  border-radius:var(--rsm);color:var(--red);font-size:13px;margin-top:5px}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:var(--surf);padding:4px;border-radius:var(--r);
  margin-bottom:18px;width:fit-content;flex-wrap:wrap}
.tab{padding:7px 16px;font-size:13px;font-weight:500;border:none;border-radius:7px;
  background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s}
.tab.active{background:var(--surf3);color:var(--txt)}

/* ── CARDS ── */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  overflow:hidden;margin-bottom:12px}
.card-hdr{padding:11px 16px;border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:600}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;border:1px solid transparent}

/* ── FIXTURE ROWS ── */
.ronda-lbl{padding:5px 16px;font-size:10px;font-weight:600;letter-spacing:.08em;
  color:var(--txt3);text-transform:uppercase;background:var(--surf2);
  border-bottom:1px solid var(--brd)}
.partido-row{display:flex;align-items:center;gap:10px;padding:11px 16px;
  border-bottom:1px solid var(--brd);transition:background .1s}
.partido-row:last-child{border-bottom:none}
.partido-row:hover{background:var(--surf2)}
.g-pill{width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.equipos{flex:1;min-width:0}
.e-names{font-size:13px;font-weight:500;line-height:1.4}
.e-sep{color:var(--txt3);margin:0 5px;font-weight:300}
.e-vs{color:var(--txt3);margin:0 8px;font-size:12px}
.descansan{font-size:11px;color:var(--txt3);font-style:italic;margin-top:2px}
.games-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.g-in{width:46px;background:var(--surf3);border:1px solid var(--brd2);border-radius:var(--rsm);
  color:var(--txt);font-family:'DM Mono',monospace;font-size:16px;font-weight:600;
  text-align:center;padding:6px 4px;outline:none;transition:border-color .15s}
.g-in:focus{box-shadow:0 0 0 3px rgba(76,217,100,.12)}
.g-in:disabled{opacity:.4;cursor:not-allowed}
.g-dash{color:var(--txt3);font-size:13px}
.pts-chip{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:4px}

/* ── POSICIONES ── */
.pos-table{width:100%;border-collapse:collapse}
.pos-table th{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.06em;
  text-transform:uppercase;padding:9px 12px;text-align:center;border-bottom:1px solid var(--brd)}
.pos-table th:nth-child(2){text-align:left}
.pos-table td{padding:10px 12px;border-bottom:1px solid var(--brd);text-align:center;font-size:13px}
.pos-table td:nth-child(2){text-align:left;font-weight:500}
.pos-table tr:last-child td{border-bottom:none}
.rk{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;background:var(--surf3);color:var(--txt2)}
.rk.g{background:rgba(255,170,0,.18);color:var(--amber)}
.rk.s{background:rgba(10,132,255,.15);color:var(--blue)}
.pts-val{font-family:'DM Mono',monospace;font-weight:600;font-size:15px}
.dif-p{color:var(--green)} .dif-n{color:var(--red)}

/* ── FINALES ── */
.copa-bar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;font-size:13px;font-weight:600}
.cls-list{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;
  border-top:1px solid var(--brd)}
.cls-chip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid}

/* ── ADMIN PANEL ── */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.jug-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.jug-num{font-size:11px;color:var(--txt3);min-width:18px;text-align:right;
  font-family:'DM Mono',monospace}
.jug-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.jug-in{flex:1;background:var(--surf2);border:1px solid transparent;border-radius:var(--rsm);
  color:var(--txt);font-size:13px;padding:6px 10px;outline:none}
.jug-in:focus{border-color:var(--brd2)}
.grp-sel{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rsm);
  color:var(--txt2);font-size:12px;padding:4px 6px;outline:none;width:52px}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  padding:32px;width:320px;text-align:center}
.login-title{font-size:18px;font-weight:600;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--txt2);margin-bottom:24px}
.login-in{width:100%;background:var(--surf2);border:1px solid var(--brd2);border-radius:var(--rsm);
  color:var(--txt);font-size:15px;padding:10px 14px;outline:none;margin-bottom:10px;text-align:center}
.login-in:focus{border-color:var(--green)}
.login-err{font-size:12px;color:var(--red);margin-top:6px;min-height:16px}
.btn-ghost{background:transparent;border:1px solid var(--brd);border-radius:var(--rsm);
  color:var(--txt2);font-size:13px;padding:7px 16px;margin-top:8px}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-ico{font-size:40px;margin-bottom:10px}
.spinner{width:24px;height:24px;border:2px solid var(--brd);border-top-color:var(--green);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surf3);border:1px solid var(--brd2);border-radius:var(--r);
  padding:10px 20px;font-size:13px;font-weight:500;z-index:999;
  animation:fade-in .2s ease;pointer-events:none}
@keyframes fade-in{from{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* ── MOBILE ── */
@media(max-width:700px){
  .sidebar{display:none;position:fixed;left:0;top:0;height:100vh;z-index:200;
    background:var(--bg);width:280px}
  .sidebar.open{display:block}
  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
  .mob-overlay.show{display:block}
  .main{padding:14px}
  .admin-grid{grid-template-columns:1fr}
  .mob-menu{display:flex!important}
  .e-names{font-size:12px}
  .partido-row{padding:9px 12px;gap:8px}
}
.mob-menu{display:none;align-items:center;justify-content:center;
  width:34px;height:34px;background:var(--surf2);border:1px solid var(--brd);
  border-radius:var(--rsm);color:var(--txt);font-size:18px;margin-right:4px}
</style>
</head>
<body>

<div class="mob-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- HEADER -->
<header class="hdr">
  <button class="mob-menu" onclick="toggleSidebar()">☰</button>
  <div class="hdr-logo">🎾</div>
  <div>
    <div class="hdr-name" id="hdr-nombre">Super Americano</div>
    <div class="hdr-sub" id="hdr-sub">Cargando...</div>
  </div>
  <div class="hdr-right">
    <div class="ws-dot" id="ws-dot" title="Conexión en tiempo real"></div>
    <span class="role-badge" id="role-badge">Viewer</span>
    <button class="btn-ghost" style="padding:5px 12px;font-size:12px" onclick="showLogin()">
      Admin
    </button>
  </div>
</header>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="s-sec">
    <div class="s-lbl">Vista</div>
    <button class="nav-btn active" id="nav-fixture" onclick="setTab('fixture')">
      <span class="nav-icon">📋</span> Fixture
    </button>
    <button class="nav-btn" id="nav-posiciones" onclick="setTab('posiciones')">
      <span class="nav-icon">🏆</span> Posiciones
    </button>
    <button class="nav-btn" id="nav-finales" onclick="setTab('finales')">
      <span class="nav-icon">⚡</span> Finales
    </button>
  </div>

  <div class="s-sec" id="sidebar-admin" style="display:none">
    <div class="s-lbl">Admin</div>
    <button class="nav-btn" id="nav-config" onclick="setTab('config')">
      <span class="nav-icon">⚙️</span> Configuración
    </button>
    <button class="nav-btn" id="nav-jugadores" onclick="setTab('jugadores')">
      <span class="nav-icon">👥</span> Jugadores
    </button>
    <div style="margin-top:10px">
      <button class="btn-danger" onclick="confirmReset()">🗑 Nuevo torneo</button>
    </div>
  </div>

  <!-- Parámetros rápidos solo lectura -->
  <div class="s-sec" id="params-display">
    <div class="s-lbl">Parámetros</div>
    <div class="param-row"><span class="param-lbl">Canchas</span><span id="p-canchas" class="pts-val" style="font-size:14px">—</span></div>
    <div class="param-row"><span class="param-lbl">Games/partido</span><span id="p-games" class="pts-val" style="font-size:14px">—</span></div>
    <div class="param-row"><span class="param-lbl">Rondas prel.</span><span id="p-rondas" class="pts-val" style="font-size:14px">—</span></div>
    <div class="param-row"><span class="param-lbl">Rondas final</span><span id="p-rondas-f" class="pts-val" style="font-size:14px">—</span></div>
  </div>

  <div class="s-sec">
    <div class="hint-box" id="hint-tiempo" style="display:none"></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="main-content">
  <div class="empty"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;color:var(--txt2)">Conectando...</div></div>
</main>

</div>

<!-- LOGIN MODAL (inline, toggle) -->
<div id="login-wrap" style="display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center">
  <div class="login-card">
    <div class="login-title">🔐 Acceso admin</div>
    <div class="login-sub">Ingresá la contraseña para editar</div>
    <input class="login-in" type="password" id="login-pass" placeholder="Contraseña"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-main" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
    <br>
    <button class="btn-ghost" onclick="hideLogin()">Cancelar</button>
  </div>
</div>

<script>
// ── Estado global ──────────────────────────────────────────────────────────
const S = {
  role: 'viewer',    // 'viewer' | 'admin'
  password: '',
  tab: 'fixture',
  state: null,       // último estado del servidor
  ws: null,
  jugadores_edit: [], // copia editable en el panel jugadores
};

const LETRAS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const COLORES = [
  {bg:'rgba(76,217,100,.14)',  brd:'rgba(76,217,100,.35)',  txt:'#4cd964'},
  {bg:'rgba(10,132,255,.14)',  brd:'rgba(10,132,255,.35)',  txt:'#4da6ff'},
  {bg:'rgba(255,170,0,.14)',   brd:'rgba(255,170,0,.35)',   txt:'#ffaa00'},
  {bg:'rgba(255,69,58,.14)',   brd:'rgba(255,69,58,.35)',   txt:'#ff6b62'},
  {bg:'rgba(191,90,242,.14)',  brd:'rgba(191,90,242,.35)',  txt:'#bf5af2'},
  {bg:'rgba(100,210,255,.14)', brd:'rgba(100,210,255,.35)', txt:'#64d2ff'},
];

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectWS(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  S.ws = ws;

  ws.onopen = () => {
    document.getElementById('ws-dot').classList.add('ok');
    // keep-alive ping cada 25s
    S._ping = setInterval(()=>{ if(ws.readyState===1) ws.send('ping'); }, 25000);
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'state'){
      applyStateSafe(data);
    }
  };
  ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('ok');
    clearInterval(S._ping);
    setTimeout(connectWS, 2000); // reconectar
  };
}

function applyState(data, skipFixtureRender=false){
  const cfg = data.config || {};
  // Header
  document.getElementById('hdr-nombre').textContent = cfg.torneo_nombre || 'Super Americano';
  document.getElementById('hdr-sub').textContent =
    `${data.jugadores?.length || 0} jugadores · ${cfg.canchas || '?'} canchas`;
  // Params sidebar
  document.getElementById('p-canchas').textContent = cfg.canchas || '—';
  document.getElementById('p-games').textContent   = cfg.games_partido || '—';
  document.getElementById('p-rondas').textContent  = cfg.rondas_prel || '—';
  document.getElementById('p-rondas-f').textContent= cfg.rondas_final || '—';
  // Sugerencia
  if(data.sugerencia){
    const s = data.sugerencia;
    const box = document.getElementById('hint-tiempo');
    box.style.display = 'block';
    box.innerHTML = `⏱ <strong>${cfg.tiempo_cancha||90} min</strong> de cancha<br>
      Sugerido: <strong>${s.rondas_prel} rondas</strong> prel + ${s.rondas_final} final<br>
      ~${s.mins_x_partido} min/partido · Tiempo est: ${s.tiempo_total_est} min`;
  }
  // Si hay un input de games con foco (admin ingresando), no re-renderizar el fixture
  if(skipFixtureRender && S.tab === 'fixture'){
    // Solo actualizar los chips de puntos sin tocar los inputs
    updatePtsChips(data);
  } else {
    renderTab();
  }
}

// Actualiza solo los chips de puntos sin re-renderizar el fixture completo
function updatePtsChips(data){
  const {grupos, fixtures_prel, resultados} = data;
  if(!grupos) return;
  grupos.forEach((grupo, gi)=>{
    (fixtures_prel[gi]||[]).forEach(([j1,j2,j3,j4], ri)=>{
      const key = `prel-${gi}-${ri}`;
      const res = (resultados||{})[key]||{};
      if(res.ga==null || res.gb==null) return;
      const ga=+res.ga, gb=+res.gb;
      const p1 = ga>gb?'3pts':ga===gb?'1pt':'0pts';
      const p2 = gb>ga?'3pts':ga===gb?'1pt':'0pts';
      const chipsEl = document.getElementById(`chips-${gi}-${ri}`);
      if(chipsEl){
        chipsEl.innerHTML = `<span class="pts-chip" style="background:var(--green-d);color:var(--green)">${p1}</span>
          <span style="color:var(--txt3)">vs</span>
          <span class="pts-chip" style="background:var(--blue-d);color:var(--blue)">${p2}</span>`;
      }
    });
  });
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function setTab(tab){
  S.tab = tab;
  ['fixture','posiciones','finales','config','jugadores'].forEach(t=>{
    const el = document.getElementById(`nav-${t}`);
    if(el) el.classList.toggle('active', t===tab);
  });
  closeSidebar();
  renderTab();
}

function renderTab(){
  const el = document.getElementById('main-content');
  if(!S.state){
    el.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
    return;
  }
  if(S.tab==='fixture')     el.innerHTML = renderFixture();
  if(S.tab==='posiciones')  el.innerHTML = renderPosiciones();
  if(S.tab==='finales')     el.innerHTML = renderFinales();
  if(S.tab==='config')      el.innerHTML = S.role==='admin' ? renderConfig()    : noAccess();
  if(S.tab==='jugadores')   el.innerHTML = S.role==='admin' ? renderJugadores() : noAccess();
}

function noAccess(){
  return `<div class="empty"><div class="empty-ico">🔒</div>
    <div style="font-size:14px;margin-top:8px">Solo el admin puede ver esta sección</div></div>`;
}

// ── FIXTURE ───────────────────────────────────────────────────────────────
function renderFixture(){
  const {grupos, fixtures_prel, config, resultados} = S.state;
  if(!grupos || !grupos.length)
    return `<div class="empty"><div class="empty-ico">👥</div>
      <div style="font-size:14px;margin-top:8px">No hay jugadores cargados.<br>
      El admin debe configurar el torneo.</div></div>`;

  const rp = parseInt(config.rondas_prel)||7;
  const ng = parseInt(config.games_partido)||16;
  let html = '';

  for(let r=0;r<rp;r++){
    html += `<div class="card">
      <div class="card-hdr">
        <span class="card-title">Ronda ${r+1}</span>
        <span class="badge" style="background:var(--green-d);color:var(--green)">hasta ${ng} games</span>
      </div>`;

    grupos.forEach((grupo, gi)=>{
      if(!fixtures_prel[gi] || r >= fixtures_prel[gi].length) return;
      const [j1,j2,j3,j4] = fixtures_prel[gi][r];
      const col = COLORES[gi % COLORES.length];
      const jugando = new Set([j1,j2,j3,j4]);
      const descansan = grupo.filter(p=>!jugando.has(p));
      const key = `prel-${gi}-${r}`;
      const res = (resultados||{})[key] || {};
      const ga = res.ga ?? '';
      const gb = res.gb ?? '';

      // Puntos actuales
      let p1='', p2='';
      if(ga!==''&&gb!==''){
        const a=+ga,b=+gb;
        p1=a>b?'3pts':a===b?'1pt':'0pts';
        p2=b>a?'3pts':a===b?'1pt':'0pts';
      }

      const dis = S.role!=='admin' ? 'disabled' : '';

      html += `<div class="partido-row">
        <span class="g-pill" style="background:${col.bg};color:${col.txt}">${LETRAS[gi]}</span>
        <div class="equipos">
          <div class="e-names">
            <strong>${j1}</strong><span class="e-sep">+</span><strong>${j2}</strong>
            <span class="e-vs">vs</span>
            <strong>${j3}</strong><span class="e-sep">+</span><strong>${j4}</strong>
          </div>
          ${descansan.length ? `<div class="descansan">Descansan: ${descansan.join(', ')}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="games-wrap">
            <input class="g-in" type="number" min="0" max="99" value="${ga}" placeholder="—"
              style="border-color:${col.brd}" ${dis}
              onchange="saveRes('${key}',this,'a_${gi}_${r}')">
            <span class="g-dash">—</span>
            <input class="g-in" type="number" min="0" max="99" value="${gb}" placeholder="—"
              style="border-color:${col.brd}" ${dis}
              onchange="saveRes('${key}',this,'b_${gi}_${r}')">
          </div>
          <div id="chips-${gi}-${r}" style="display:flex;gap:4px;font-size:11px;min-height:18px">
            ${(p1&&p2) ? `<span class="pts-chip" style="background:var(--green-d);color:var(--green)">${p1}</span>
            <span style="color:var(--txt3)">vs</span>
            <span class="pts-chip" style="background:var(--blue-d);color:var(--blue)">${p2}</span>` : ''}
          </div>
        </div>
      </div>`;
    });

    html += `</div>`;
  }
  return html;
}

async function saveRes(key, inputEl, pairKey){
  if(S.role !== 'admin') return;
  // Buscar el par (a y b) del mismo partido
  const parts = key.split('-'); // prel-gi-ri
  const gi = parts[1], ri = parts[2];
  const keyA = `a_${gi}_${ri}`, keyB = `b_${gi}_${ri}`;
  const elA = document.querySelector(`input[onchange*="${keyA}"]`);
  const elB = document.querySelector(`input[onchange*="${keyB}"]`);
  if(!elA || !elB || elA.value==='' || elB.value==='') return;

  const body = {
    password: S.password,
    id: key,
    games_a: parseInt(elA.value),
    games_b: parseInt(elB.value),
    fase: 'prel'
  };
  const res = await api('/api/resultado', body);
  if(res.ok) toast('✓ Guardado');
}

async function saveResFinal(key, inputEl, pairKey){
  if(S.role !== 'admin') return;
  const parts = key.split('-'); // final-copa-ri
  const copa = parts[1], ri = parts[2];
  const keyA = `fa_${copa}_${ri}`, keyB = `fb_${copa}_${ri}`;
  const elA = document.querySelector(`input[onchange*="${keyA}"]`);
  const elB = document.querySelector(`input[onchange*="${keyB}"]`);
  if(!elA || !elB || elA.value==='' || elB.value==='') return;

  const body = {
    password: S.password,
    id: key,
    games_a: parseInt(elA.value),
    games_b: parseInt(elB.value),
    fase: 'final'
  };
  const res = await api('/api/resultado', body);
  if(res.ok) toast('✓ Guardado');
}

// ── POSICIONES ────────────────────────────────────────────────────────────
function calcStats(){
  const {grupos, fixtures_prel, resultados} = S.state;
  const stats = {};
  (grupos||[]).forEach((g,gi)=>{
    g.forEach(j=>{ stats[j]={pj:0,gf:0,gc:0,pts:0,gi}; });
    (fixtures_prel[gi]||[]).forEach(([j1,j2,j3,j4], ri)=>{
      const res = (resultados||{})[`prel-${gi}-${ri}`];
      if(!res || res.ga==null) return;
      const ga=+res.ga, gb=+res.gb;
      [j1,j2].forEach(j=>{ if(stats[j]){stats[j].gf+=ga;stats[j].gc+=gb;stats[j].pj++;} });
      [j3,j4].forEach(j=>{ if(stats[j]){stats[j].gf+=gb;stats[j].gc+=ga;stats[j].pj++;} });
      const p1=ga>gb?3:ga===gb?1:0, p2=gb>ga?3:ga===gb?1:0;
      [j1,j2].forEach(j=>{ if(stats[j]) stats[j].pts+=p1; });
      [j3,j4].forEach(j=>{ if(stats[j]) stats[j].pts+=p2; });
    });
  });
  return stats;
}

function sortGrupo(grupo, stats){
  return [...grupo].sort((a,b)=>{
    const sa=stats[a]||{}, sb=stats[b]||{};
    if((sb.pts||0)!==(sa.pts||0)) return (sb.pts||0)-(sa.pts||0);
    const da=(sa.gf||0)-(sa.gc||0), db=(sb.gf||0)-(sb.gc||0);
    if(db!==da) return db-da;
    return (sb.gf||0)-(sa.gf||0);
  });
}

function renderPosiciones(){
  const {grupos} = S.state;
  if(!grupos||!grupos.length) return noJugadores();
  const stats = calcStats();
  let html = '';

  grupos.forEach((grupo, gi)=>{
    const col = COLORES[gi%COLORES.length];
    const sorted = sortGrupo(grupo, stats);
    html += `<div class="card">
      <div class="card-hdr">
        <span class="card-title">Grupo ${LETRAS[gi]}</span>
        <span class="badge" style="background:${col.bg};color:${col.txt};border-color:${col.brd}">
          ${grupo.length} jugadores
        </span>
      </div>
      <table class="pos-table">
        <thead><tr><th>Pos</th><th>Jugador</th><th>PJ</th><th>GF</th><th>GC</th><th>Dif</th><th>Pts</th></tr></thead>
        <tbody>`;
    sorted.forEach((j,pos)=>{
      const s=stats[j]||{pj:0,gf:0,gc:0,pts:0};
      const dif=s.gf-s.gc;
      html += `<tr>
        <td><span class="rk ${pos===0?'g':pos===1?'s':''}">${pos+1}</span></td>
        <td>${j}</td>
        <td style="color:var(--txt2)">${s.pj}</td>
        <td style="color:var(--txt2)">${s.gf}</td>
        <td style="color:var(--txt2)">${s.gc}</td>
        <td class="${dif>0?'dif-p':dif<0?'dif-n':''}">${dif>0?'+':''}${dif}</td>
        <td><span class="pts-val" style="color:${col.txt}">${s.pts}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  return html;
}

// ── FINALES ───────────────────────────────────────────────────────────────
function renderFinales(){
  const {grupos, fixtures_final, config, resultados} = S.state;
  if(!grupos||!grupos.length) return noJugadores();
  const stats = calcStats();
  const ng = parseInt(config.games_partido)||16;

  const copasDef = [
    {id:'oro',    emoji:'🥇', label:'Copa Oro',    desc:'1° y 2° de cada grupo', color:'#b97b00', bg:'rgba(255,170,0,.1)',   brd:'rgba(255,170,0,.3)'},
    {id:'plata',  emoji:'🥈', label:'Copa Plata',  desc:'3° y 4° de cada grupo', color:'#4da6ff', bg:'rgba(10,132,255,.1)',  brd:'rgba(10,132,255,.3)'},
    {id:'bronce', emoji:'🥉', label:'Copa Bronce', desc:'5° y 6° de cada grupo', color:'#c4956a', bg:'rgba(196,149,106,.1)', brd:'rgba(196,149,106,.3)'},
  ];

  let html = '';
  const dis = S.role!=='admin' ? 'disabled' : '';

  copasDef.forEach(({id,emoji,label,desc,color,bg,brd})=>{
    const fix = (fixtures_final||{})[id] || [];
    if(!fix.length) return;

    // Clasificados para esta copa
    const clasificadosPorGrupo = grupos.map(g=>sortGrupo(g,stats));
    const posMap = {oro:[0,1], plata:[2,3], bronce:[4,5]};
    const clasificados = [];
    posMap[id].forEach(pos=>{
      clasificadosPorGrupo.forEach(sg=>{ if(sg[pos]) clasificados.push(sg[pos]); });
    });

    html += `<div class="card" style="margin-bottom:14px">
      <div class="copa-bar" style="background:${bg};color:${color}">
        <span>${emoji} ${label}</span>
        <span style="font-size:12px;font-weight:400;opacity:.8">${desc} · hasta ${ng} games</span>
      </div>
      <div class="cls-list">`;
    clasificados.forEach((j,i)=>{
      html += `<span class="cls-chip" style="background:${bg};color:${color};border-color:${brd}">${i+1}. ${j}</span>`;
    });
    html += `</div><table class="pos-table">
      <thead><tr><th>Rda</th><th>Equipo A</th><th>Games</th><th>Equipo B</th><th>Descansan</th></tr></thead>
      <tbody>`;

    fix.forEach(([j1,j2,j3,j4], ri)=>{
      const key = `final-${id}-${ri}`;
      const res = (resultados||{})[key]||{};
      const ga = res.ga ?? '', gb = res.gb ?? '';
      const jugando = new Set([j1,j2,j3,j4]);
      const descansan = clasificados.filter(p=>!jugando.has(p));

      html += `<tr>
        <td style="color:var(--txt3);font-size:12px">${ri+1}</td>
        <td style="text-align:left;font-weight:500">${j1} + ${j2}</td>
        <td>
          <div class="games-wrap" style="justify-content:center">
            <input class="g-in" type="number" min="0" max="99" value="${ga}" placeholder="—"
              style="border-color:${brd};width:42px" ${dis}
              onchange="saveResFinal('${key}',this,'fa_${id}_${ri}')">
            <span class="g-dash">—</span>
            <input class="g-in" type="number" min="0" max="99" value="${gb}" placeholder="—"
              style="border-color:${brd};width:42px" ${dis}
              onchange="saveResFinal('${key}',this,'fb_${id}_${ri}')">
          </div>
        </td>
        <td style="text-align:left;font-weight:500">${j3} + ${j4}</td>
        <td style="text-align:left;font-size:11px;color:var(--txt3)">${descansan.join(', ')||'—'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  return html || `<div class="empty"><div class="empty-ico">⏳</div>
    <div style="font-size:14px;margin-top:8px">Las finales se arman cuando haya resultados de la fase preliminar.</div></div>`;
}

  return `<div class="card">

    <div style="padding:16px;display:grid;gap:10px">

async function updateSug(){
  const t = document.getElementById('cfg-tiempo')?.value||90;
  const g = document.getElementById('cfg-games')?.value||16;
  const res = await fetch(`/api/sugerencia?tiempo=${t}&games=${g}`);
  const s = await res.json();
  const el = document.getElementById('cfg-sug');
  if(el) el.innerHTML = `⏱ Con <strong>${t} min</strong> y ${s.n_x_grupo} jug/grupo:<br>
    Máx sin repetir: <strong>${s.rondas_max_sin_repetir} rondas</strong> · Por tiempo: ${s.rondas_prel_x_tiempo}<br>
    → Sugerido: <strong>${s.rondas_prel} prelim</strong> + ${s.rondas_final} final · ~${s.tiempo_total_est} min total`;
}

async function saveConfig(){
  const body = {
    password: S.password,
    config: {
      torneo_nombre:  document.getElementById('cfg-nombre').value,
      canchas:        document.getElementById('cfg-canchas').value,
      rondas_prel:    document.getElementById('cfg-rondas').value,
      rondas_final:   document.getElementById('cfg-rondas-f').value,
      games_partido:  document.getElementById('cfg-games').value,
      tiempo_cancha:  document.getElementById('cfg-tiempo').value,
    }
  };
  const res = await api('/api/config', body);
  if(res.ok) toast('✓ Configuración guardada');
}

// ── JUGADORES (admin) ──────────────────────────────────────────────────────
function renderJugadores(){
  const {jugadores, config} = S.state;
  const nc = parseInt(config.canchas)||3;

  // Inicializar lista editable si está vacía o desincronizada
  if(!S.jugadores_edit.length){
    if(jugadores && jugadores.length){
      S.jugadores_edit = jugadores.map(j=>({...j}));
    } else {
      S.jugadores_edit = Array.from({length:18},(_,i)=>({nombre:'',grupo:Math.floor(i/(Math.round(18/nc))),orden:i}));
    }
  }

  // Agrupar para display
  const grupos = {};
  S.jugadores_edit.forEach((j,i)=>{
    const g = j.grupo ?? 0;
    if(!grupos[g]) grupos[g]=[];
    grupos[g].push({...j, _idx:i});
  });

  let html = `<div class="card">
    <div class="card-hdr">
      <span class="card-title">👥 Jugadores</span>
      <div style="display:flex;gap:6px">
        <button class="badge" style="background:var(--amber-d);color:var(--amber);cursor:pointer;border:none" onclick="shuffleJugadores()">🔀 Sortear</button>
        <button class="badge" style="background:var(--green-d);color:var(--green);cursor:pointer;border:none" onclick="saveJugadores()">💾 Guardar</button>
      </div>
    </div>
    <div style="padding:14px">
      <div style="font-size:12px;color:var(--txt2);margin-bottom:12px">
        Escribí los nombres. El grupo se asigna automáticamente según el orden.<br>
        Después de sortear podés ajustar el grupo de cada jugador.
      </div>`;

  // Lista plana de inputs
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px">`;
  S.jugadores_edit.forEach((j,i)=>{
    const col = COLORES[(j.grupo||0) % COLORES.length];
    html += `<div class="jug-row">
      <span class="jug-num">${i+1}</span>
      <span class="jug-dot" style="background:${col.txt}"></span>
      <input class="jug-in" type="text" value="${j.nombre||''}" placeholder="Jugador ${i+1}"
        oninput="S.jugadores_edit[${i}].nombre=this.value">
      <select class="grp-sel" onchange="S.jugadores_edit[${i}].grupo=+this.value;renderTab()">
        ${Array.from({length:nc},(_,g)=>`<option value="${g}" ${(j.grupo||0)===g?'selected':''}>${LETRAS[g]}</option>`).join('')}
      </select>
    </div>`;
  });
  html += `</div>`;

  // Botones agregar/quitar
  html += `<div style="display:flex;gap:8px">
    <button class="btn-sec" onclick="addJug()">+ Agregar jugador</button>
    <button class="btn-sec" onclick="removeJug()">− Quitar último</button>
  </div>`;

  html += `</div></div>`;
  return html;
}

function addJug(){
  const nc = parseInt(S.state?.config?.canchas)||3;
  const n = S.jugadores_edit.length;
  const tam = Math.max(4, Math.round((n+1)/nc));
  S.jugadores_edit.push({nombre:'', grupo:Math.floor(n/tam), orden:n});
  renderTab();
}
function removeJug(){
  if(S.jugadores_edit.length>4){ S.jugadores_edit.pop(); renderTab(); }
}

async function shuffleJugadores(){
  const nombres = S.jugadores_edit.map(j=>j.nombre).filter(n=>n.trim());
  if(!nombres.length){ toast('Ingresá nombres primero'); return; }
  const res = await api('/api/shuffle', {password:S.password, nombres});
  if(res.ok){
    S.jugadores_edit = [];  // forzar re-sync desde estado
    toast('🔀 Grupos sorteados');
  }
}

async function saveJugadores(){
  const jugadores = S.jugadores_edit
    .filter(j=>j.nombre.trim())
    .map((j,i)=>({nombre:j.nombre.trim(), grupo:j.grupo||0, orden:i}));
  const res = await api('/api/jugadores', {password:S.password, jugadores});
  if(res.ok){ S.jugadores_edit=[]; toast('✓ Jugadores guardados'); }
}

// ── RESET ─────────────────────────────────────────────────────────────────
function confirmReset(){
  if(confirm('¿Empezar nuevo torneo? Se borran todos los puntajes y jugadores.')){
    api('/api/reset', {password:S.password}).then(r=>{ if(r.ok){ S.jugadores_edit=[]; toast('Torneo reseteado'); } });
  }
}

// ── AUTH ──────────────────────────────────────────────────────────────────
function showLogin(){
  if(S.role==='admin'){ S.role='viewer'; S.password=''; updateRoleUI(); return; }
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').textContent='';
  setTimeout(()=>document.getElementById('login-pass').focus(),50);
}
function hideLogin(){
  document.getElementById('login-wrap').style.display='none';
}

async function doLogin(){
  const pass = document.getElementById('login-pass').value;
  const res = await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pass})});
  if(res.ok){
    S.role='admin'; S.password=pass;
    hideLogin(); updateRoleUI(); renderTab();
    toast('✓ Modo admin activado');
  } else {
    document.getElementById('login-err').textContent='Contraseña incorrecta';
  }
}

function updateRoleUI(){
  const badge = document.getElementById('role-badge');
  const adminSec = document.getElementById('sidebar-admin');
  const loginBtn = document.querySelector('.hdr-right .btn-ghost');
  if(S.role==='admin'){
    badge.textContent='Admin'; badge.className='role-badge role-admin';
    adminSec.style.display='block';
    if(loginBtn) loginBtn.textContent='Salir admin';
  } else {
    badge.textContent='Viewer'; badge.className='role-badge role-viewer';
    adminSec.style.display='none';
    if(loginBtn) loginBtn.textContent='Admin';
  }
}

// ── API helper ─────────────────────────────────────────────────────────────
async function api(path, body){
  try {
    const res = await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)});
    if(!res.ok){ const e=await res.json(); toast('Error: '+(e.detail||res.status)); return {ok:false}; }
    return await res.json();
  } catch(e){ toast('Error de conexión'); return {ok:false}; }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function noJugadores(){
  return `<div class="empty"><div class="empty-ico">👥</div>
    <div style="font-size:14px;margin-top:8px">No hay jugadores cargados.</div></div>`;
}

let _toastTimer;
function toast(msg){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.remove(), 2500);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── INIT ───────────────────────────────────────────────────────────────────

// Aplica estado sin romper inputs con foco (admin ingresando games)
function applyStateSafe(data){
  S.state = data;
  const focused = document.activeElement;
  const skip = focused && focused.classList.contains('g-in');
  applyState(data, skip);
}

// Cambia grupo de un jugador sin re-renderizar toda la lista
function changeGrupo(idx, grupo){
  S.jugadores_edit[idx].grupo = grupo;
  const rows = document.querySelectorAll('.jug-row');
  if(rows[idx]){
    const dot = rows[idx].querySelector('.jug-dot');
    if(dot) dot.style.background = COLORES[grupo % COLORES.length].txt;
  }
}

connectWS();
