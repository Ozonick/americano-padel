<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Americano 🎾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --surface3: #2a2a2a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --green: #4cd964;
  --green-dim: rgba(76,217,100,0.12);
  --blue: #0a84ff;
  --blue-dim: rgba(10,132,255,0.12);
  --amber: #ffa500;
  --amber-dim: rgba(255,165,0,0.12);
  --red: #ff453a;
  --red-dim: rgba(255,69,58,0.12);
  --r: 10px;
  --r-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* ── Header ── */
.app-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(12px);
  z-index: 100;
}
.app-logo {
  width: 36px; height: 36px;
  background: var(--green);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.app-name { font-size: 17px; font-weight: 600; }
.app-sub  { font-size: 12px; color: var(--text2); margin-top: 1px; }

/* ── Layout ── */
.layout { display: flex; min-height: calc(100vh - 65px); }
.sidebar {
  width: 280px;
  min-width: 280px;
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  overflow-y: auto;
  position: sticky;
  top: 65px;
  height: calc(100vh - 65px);
}
.main { flex: 1; padding: 20px 24px; overflow-y: auto; }

/* ── Sidebar sections ── */
.s-section { margin-bottom: 24px; }
.s-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-left: 4px;
}
.param-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: var(--r-sm);
  margin-bottom: 6px;
}
.param-label { font-size: 13px; color: var(--text2); }
.param-input {
  width: 60px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  padding: 4px 6px;
  outline: none;
}
.param-input:focus { border-color: var(--green); }
.games-hint {
  font-size: 11px;
  color: var(--text3);
  padding: 0 4px;
  margin-top: -2px;
  margin-bottom: 6px;
}

/* ── Players list ── */
.player-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 5px;
}
.player-num {
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  min-width: 18px;
  text-align: right;
}
.player-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid transparent;
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 6px 10px;
  outline: none;
  transition: border-color .15s;
}
.player-input:focus { border-color: var(--border2); background: var(--surface3); }
.player-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}

.player-actions {
  display: flex; gap: 6px; margin-top: 8px;
}
.btn-sm {
  flex: 1;
  padding: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.btn-sm:hover { background: var(--surface3); color: var(--text); }

/* ── Generate button ── */
.btn-generate {
  width: 100%;
  padding: 11px;
  background: var(--green);
  border: none;
  border-radius: var(--r);
  color: #000;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity .15s, transform .1s;
}
.btn-generate:hover  { opacity: .88; }
.btn-generate:active { transform: scale(.98); }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 4px;
  margin-bottom: 20px;
  background: var(--surface);
  padding: 4px;
  border-radius: var(--r);
  width: fit-content;
}
.tab {
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.tab.active {
  background: var(--surface3);
  color: var(--text);
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 12px;
}
.card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 13px; font-weight: 600; }
.card-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.card-body { padding: 0; }

/* ── Ronda block ── */
.ronda-label {
  padding: 6px 16px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  color: var(--text3);
  text-transform: uppercase;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.partido-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.partido-row:last-child { border-bottom: none; }
.partido-row:hover { background: var(--surface2); }
.grupo-pill {
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.equipos { flex: 1; min-width: 0; }
.equipo-names { font-size: 14px; font-weight: 500; }
.equipo-names .sep { color: var(--text3); margin: 0 6px; font-weight: 300; }
.descansa-txt { font-size: 11px; color: var(--text3); margin-top: 2px; font-style: italic; }
.games-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.game-in {
  width: 48px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  padding: 6px 4px;
  outline: none;
  transition: border-color .15s;
}
.game-in:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(76,217,100,.1); }
.games-dash { color: var(--text3); font-size: 13px; }

/* ── Posiciones ── */
.pos-table { width: 100%; border-collapse: collapse; }
.pos-table th {
  font-size: 11px; font-weight: 600;
  color: var(--text3);
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.pos-table th:nth-child(2) { text-align: left; }
.pos-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  font-size: 14px;
}
.pos-table td:nth-child(2) { text-align: left; font-weight: 500; }
.pos-table tr:last-child td { border-bottom: none; }
.pos-rk {
  width: 24px; height: 24px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  background: var(--surface3);
  color: var(--text2);
}
.pos-rk.gold   { background: rgba(255,165,0,.2);   color: var(--amber); }
.pos-rk.silver { background: rgba(10,132,255,.15); color: var(--blue); }
.pts-val { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 15px; }
.dif-pos { color: var(--green); }
.dif-neg { color: var(--red); }

/* ── Copa headers ── */
.copa-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  font-size: 13px; font-weight: 600;
}
.clasificados-list {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}
.clas-chip {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid;
}

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-txt { font-size: 14px; }

/* ── Responsive (tablet) ── */
@media (max-width: 720px) {
  .sidebar {
    position: fixed; left: -280px; top: 0; height: 100vh;
    z-index: 200; background: var(--bg);
    transition: left .25s;
  }
  .sidebar.open { left: 0; }
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.6); z-index: 199;
  }
  .overlay.show { display: block; }
  .main { padding: 16px; }
  .menu-btn { display: flex !important; }
  .tabs { overflow-x: auto; width: 100%; }
  .partido-row { flex-wrap: wrap; gap: 8px; }
}
.menu-btn {
  display: none;
  align-items: center; justify-content: center;
  width: 34px; height: 34px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  cursor: pointer;
  font-size: 18px;
  margin-right: 4px;
}

/* ── Print ── */
@media print {
  .sidebar, .app-header, .tabs, .menu-btn { display: none !important; }
  .main { padding: 0; }
  .card { break-inside: avoid; border: 1px solid #ccc; }
  body { background: white; color: black; }
  .partido-row { border-bottom: 1px solid #eee; }
  .game-in { border: 1px solid #ccc; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<header class="app-header">
  <button class="menu-btn" id="menu-btn" onclick="toggleSidebar()" aria-label="Menú">☰</button>
  <div class="app-logo">🎾</div>
  <div>
    <div class="app-name">Super Americano</div>
    <div class="app-sub">Generador de fixture</div>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px">
    <button class="btn-sm" onclick="window.print()" style="padding:6px 14px;font-size:12px">Imprimir</button>
  </div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">

    <div class="s-section">
      <div class="s-label">Parámetros</div>
      <div class="param-row">
        <span class="param-label">Canchas / grupos</span>
        <input class="param-input" type="number" id="p-canchas" value="3" min="1" max="8" oninput="updateHint()">
      </div>
      <div class="param-row">
        <span class="param-label">Rondas preliminar</span>
        <input class="param-input" type="number" id="p-rondas" value="7" min="1" max="15">
      </div>
      <div class="param-row">
        <span class="param-label">Rondas finales</span>
        <input class="param-input" type="number" id="p-rondas-f" value="5" min="1" max="10">
      </div>
      <div class="param-row">
        <span class="param-label">Games por partido</span>
        <input class="param-input" type="number" id="p-games" value="16" min="4" max="40">
      </div>
      <div class="games-hint" id="games-hint">Cuando un equipo llega a 16 games, rotan.</div>
    </div>

    <div class="s-section">
      <div class="s-label">Jugadores <span id="jug-total" style="font-weight:400;color:var(--text3)"></span></div>
      <div id="players-list"></div>
      <div class="player-actions">
        <button class="btn-sm" onclick="addPlayer()">+ Agregar</button>
        <button class="btn-sm" onclick="removePlayer()">− Quitar</button>
      </div>
    </div>

    <button class="btn-generate" onclick="generate()">⚡ Generar fixture</button>

  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="tabs" id="tabs">
      <button class="tab active" onclick="setTab(0)">Fixture</button>
      <button class="tab" onclick="setTab(1)">Posiciones</button>
      <button class="tab" onclick="setTab(2)">Finales</button>
    </div>
    <div id="output">
      <div class="empty">
        <div class="empty-icon">🎾</div>
        <div class="empty-txt">Configurá los parámetros y presioná<br><strong>Generar fixture</strong></div>
      </div>
    </div>
  </main>

</div>

<script>
const LETRAS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const COLORES = [
  {bg:'rgba(76,217,100,.15)',  border:'rgba(76,217,100,.4)',  text:'#4cd964', dot:'#4cd964'},
  {bg:'rgba(10,132,255,.15)',  border:'rgba(10,132,255,.4)',  text:'#0a84ff', dot:'#0a84ff'},
  {bg:'rgba(255,165,0,.15)',   border:'rgba(255,165,0,.4)',   text:'#ffaa00', dot:'#ffaa00'},
  {bg:'rgba(255,69,58,.15)',   border:'rgba(255,69,58,.4)',   text:'#ff453a', dot:'#ff453a'},
  {bg:'rgba(191,90,242,.15)',  border:'rgba(191,90,242,.4)',  text:'#bf5af2', dot:'#bf5af2'},
  {bg:'rgba(100,210,255,.15)', border:'rgba(100,210,255,.4)', text:'#64d2ff', dot:'#64d2ff'},
];

let players = [
  'Marcelo ©','Amazing','David','Jose A','Patricio','Urraca',
  'Juan Cruz ©','Rodo','Rocky','Juanma','Christopher','Gustavo',
  'Diego ©','Daniel','Porpatto','Pipi','Marcelo Pr','Leo'
];
let activeTab = 0;
let fixtureData = null;
let resultados = {};
let resultadosFinal = {};

// ── Sidebar mobile ──
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── Players ──
function renderPlayers(){
  const jug = players.filter(p=>p.trim());
  document.getElementById('jug-total').textContent = `(${jug.length})`;
  const nc = parseInt(document.getElementById('p-canchas').value)||1;
  const tam = Math.max(4, Math.round(jug.length/nc));

  let html = '';
  players.forEach((p,i)=>{
    const gi = Math.floor(i/tam);
    const col = COLORES[gi % COLORES.length];
    html += `<div class="player-row">
      <span class="player-num">${i+1}</span>
      <span class="player-dot" style="background:${col.dot}"></span>
      <input class="player-input" type="text" value="${p}"
        oninput="players[${i}]=this.value;updateDots()"
        placeholder="Jugador ${i+1}">
    </div>`;
  });
  document.getElementById('players-list').innerHTML = html;
}

function updateDots(){
  // sync players array from inputs
  document.querySelectorAll('.player-input').forEach((el,i)=>{ players[i]=el.value; });
  document.getElementById('jug-total').textContent = `(${players.filter(p=>p.trim()).length})`;
}

function addPlayer(){ players.push(''); renderPlayers(); }
function removePlayer(){ if(players.length>4){ players.pop(); renderPlayers(); } }

function updateHint(){
  const g = parseInt(document.getElementById('p-games').value)||16;
  document.getElementById('games-hint').textContent =
    `Cuando un equipo llega a ${g} games, rotan.`;
  renderPlayers();
}

// ── Tabs ──
function setTab(i){
  activeTab = i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  renderOutput();
}

// ── Fixture generation ──
const FIXTURE_6 = [[0,1,2,3],[1,3,2,4],[2,5,3,4],[3,4,5,0],[4,0,5,1],[5,3,0,1],[1,2,0,5]];

function genFixture(grupo, rondas){
  const n = grupo.length;
  if(n === 6){
    return FIXTURE_6.slice(0,rondas).map(([a,b,c,d])=>[grupo[a],grupo[b],grupo[c],grupo[d]]);
  }
  const seen = new Set(), out = [];
  for(let a=0;a<n&&out.length<rondas;a++)
    for(let b=a+1;b<n&&out.length<rondas;b++)
      for(let c=0;c<n&&out.length<rondas;c++)
        for(let d=c+1;d<n&&out.length<rondas;d++){
          if(a===c||a===d||b===c||b===d) continue;
          const k=[Math.min(a,b),Math.max(a,b),Math.min(c,d),Math.max(c,d)].join('-');
          if(!seen.has(k)){ seen.add(k); out.push([grupo[a],grupo[b],grupo[c],grupo[d]]); }
        }
  return out;
}

function dividirGrupos(jug, nc){
  const tam = Math.max(4, Math.round(jug.length/nc));
  const gs = [];
  for(let i=0;i<jug.length;i+=tam){
    const g = jug.slice(i,i+tam);
    if(g.length) gs.push(g);
  }
  return gs;
}

function generate(){
  const jug = players.map(p=>p.trim()).filter(Boolean);
  if(jug.length < 4){ alert('Ingresá al menos 4 jugadores.'); return; }
  const nc = parseInt(document.getElementById('p-canchas').value)||3;
  const rp = parseInt(document.getElementById('p-rondas').value)||7;
  const rf = parseInt(document.getElementById('p-rondas-f').value)||5;
  const ng = parseInt(document.getElementById('p-games').value)||16;

  const grupos   = dividirGrupos(jug, nc);
  const fixtures = grupos.map(g => genFixture(g, rp));

  fixtureData = { grupos, fixtures, rondas:rp, rondasFinal:rf, nGames:ng };
  resultados = {};
  resultadosFinal = {};

  closeSidebar();
  renderOutput();
}

// ── Stats ──
function calcStats(){
  if(!fixtureData) return {};
  const { grupos, fixtures } = fixtureData;
  const stats = {};
  grupos.forEach((g,gi)=> g.forEach(j=>{ stats[j]={pj:0,gf:0,gc:0,pts:0,gi}; }));

  grupos.forEach((g,gi)=>{
    fixtures[gi].forEach(([j1,j2,j3,j4], ri)=>{
      const res = resultados[`${gi}-${ri}`];
      if(!res || res.ga==='' || res.gb==='') return;
      const ga=parseInt(res.ga)||0, gb=parseInt(res.gb)||0;
      [j1,j2].forEach(j=>{ if(stats[j]){ stats[j].gf+=ga; stats[j].gc+=gb; stats[j].pj++; } });
      [j3,j4].forEach(j=>{ if(stats[j]){ stats[j].gf+=gb; stats[j].gc+=ga; stats[j].pj++; } });
      const p1=ga>gb?3:ga===gb?1:0, p2=gb>ga?3:ga===gb?1:0;
      [j1,j2].forEach(j=>{ if(stats[j]) stats[j].pts+=p1; });
      [j3,j4].forEach(j=>{ if(stats[j]) stats[j].pts+=p2; });
    });
  });
  return stats;
}

function sortGrupo(grupo, stats){
  return grupo.slice().sort((a,b)=>{
    if((stats[b]?.pts||0) !== (stats[a]?.pts||0)) return (stats[b]?.pts||0)-(stats[a]?.pts||0);
    const da=(stats[a]?.gf||0)-(stats[a]?.gc||0), db=(stats[b]?.gf||0)-(stats[b]?.gc||0);
    if(db!==da) return db-da;
    return (stats[b]?.gf||0)-(stats[a]?.gf||0);
  });
}

// ── Render ──
function renderOutput(){
  if(!fixtureData){
    document.getElementById('output').innerHTML =
      `<div class="empty"><div class="empty-icon">🎾</div><div class="empty-txt">Configurá y presioná <strong>Generar fixture</strong></div></div>`;
    return;
  }
  if(activeTab===0) renderFixture();
  if(activeTab===1) renderPosiciones();
  if(activeTab===2) renderFinales();
}

function renderFixture(){
  const { grupos, fixtures, rondas, nGames } = fixtureData;
  let html = '';

  for(let r=0;r<rondas;r++){
    html += `<div class="card">
      <div class="card-header">
        <span class="card-title">Ronda ${r+1}</span>
        <span class="card-badge" style="background:var(--green-dim);color:var(--green)">
          hasta ${nGames} games
        </span>
      </div>
      <div class="card-body">`;

    grupos.forEach((grupo, gi)=>{
      if(r >= fixtures[gi].length) return;
      const [j1,j2,j3,j4] = fixtures[gi][r];
      const col = COLORES[gi % COLORES.length];
      const jugando = new Set([j1,j2,j3,j4]);
      const descansan = grupo.filter(p=>!jugando.has(p));
      const key = `${gi}-${r}`;
      const res = resultados[key] || {ga:'',gb:''};

      html += `<div class="partido-row">
        <span class="grupo-pill" style="background:${col.bg};color:${col.text}">${LETRAS[gi]}</span>
        <div class="equipos">
          <div class="equipo-names">
            <strong>${j1}</strong><span class="sep">+</span><strong>${j2}</strong>
            <span class="sep" style="margin:0 10px;color:var(--text3)">vs</span>
            <strong>${j3}</strong><span class="sep">+</span><strong>${j4}</strong>
          </div>
          ${descansan.length ? `<div class="descansa-txt">Descansan: ${descansan.join(', ')}</div>` : ''}
        </div>
        <div class="games-wrap">
          <input class="game-in" type="number" min="0" max="99"
            value="${res.ga}" placeholder="—"
            style="border-color:${col.border}"
            oninput="setRes('${key}','ga',this.value)">
          <span class="games-dash">—</span>
          <input class="game-in" type="number" min="0" max="99"
            value="${res.gb}" placeholder="—"
            style="border-color:${col.border}"
            oninput="setRes('${key}','gb',this.value)">
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }
  document.getElementById('output').innerHTML = html;
}

function setRes(key,field,val){
  if(!resultados[key]) resultados[key]={ga:'',gb:''};
  resultados[key][field] = val==='' ? '' : parseInt(val)||0;
}
function setResFinal(key,field,val){
  if(!resultadosFinal[key]) resultadosFinal[key]={ga:'',gb:''};
  resultadosFinal[key][field] = val==='' ? '' : parseInt(val)||0;
}

function renderPosiciones(){
  const { grupos } = fixtureData;
  const stats = calcStats();
  let html = '';

  grupos.forEach((grupo, gi)=>{
    const col = COLORES[gi % COLORES.length];
    const sorted = sortGrupo(grupo, stats);

    html += `<div class="card" style="margin-bottom:12px">
      <div class="card-header">
        <span class="card-title">Grupo ${LETRAS[gi]}</span>
        <span class="card-badge" style="background:${col.bg};color:${col.text};border:1px solid ${col.border}">
          ${grupo.length} jugadores
        </span>
      </div>
      <table class="pos-table">
        <thead><tr>
          <th>Pos</th><th>Jugador</th><th>PJ</th><th>GF</th><th>GC</th><th>Dif</th><th>Pts</th>
        </tr></thead>
        <tbody>`;

    sorted.forEach((j,pos)=>{
      const s = stats[j] || {pj:0,gf:0,gc:0,pts:0};
      const dif = s.gf - s.gc;
      const rkClass = pos===0?'gold':pos===1?'silver':'';
      html += `<tr>
        <td><span class="pos-rk ${rkClass}">${pos+1}</span></td>
        <td>${j}</td>
        <td style="color:var(--text2)">${s.pj}</td>
        <td style="color:var(--text2)">${s.gf}</td>
        <td style="color:var(--text2)">${s.gc}</td>
        <td class="${dif>0?'dif-pos':dif<0?'dif-neg':''}">${dif>0?'+':''}${dif}</td>
        <td><span class="pts-val" style="color:${col.text}">${s.pts}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  document.getElementById('output').innerHTML = html;
}

function renderFinales(){
  const { grupos, rondasFinal, nGames } = fixtureData;
  const stats = calcStats();

  const clasificadosPorGrupo = grupos.map(g => sortGrupo(g, stats));

  const copas = [
    { nombre:'Oro',     emoji:'🥇', color:'#b97b00', bg:'rgba(255,165,0,.12)', border:'rgba(255,165,0,.3)', idx:[0,1] },
    { nombre:'Plata',   emoji:'🥈', color:'#5e9ecc', bg:'rgba(10,132,255,.1)', border:'rgba(10,132,255,.3)', idx:[2,3] },
    { nombre:'Medalla', emoji:'🥉', color:'#a0806a', bg:'rgba(160,128,106,.12)',border:'rgba(160,128,106,.3)', idx:[4,5] },
  ];

  let html = '';
  copas.forEach(({nombre,emoji,color,bg,border,idx})=>{
    const clasificados = [];
    idx.forEach(pos=>{
      grupos.forEach((_,gi)=>{
        const j = clasificadosPorGrupo[gi][pos];
        if(j) clasificados.push(j);
      });
    });
    if(!clasificados.length) return;

    const fixture = genFixture(clasificados, rondasFinal);

    html += `<div class="card" style="margin-bottom:12px">
      <div class="copa-bar" style="background:${bg};color:${color}">
        <span>${emoji} Copa ${nombre}</span>
        <span style="font-size:12px;font-weight:400;opacity:.8">${clasificados.length} clasificados · hasta ${nGames} games</span>
      </div>
      <div class="clasificados-list">`;
    clasificados.forEach((j,i)=>{
      html += `<span class="clas-chip" style="background:${bg};color:${color};border-color:${border}">${i+1}. ${j}</span>`;
    });
    html += `</div>
      <table class="pos-table">
        <thead><tr><th>Rda</th><th>Equipo A</th><th>Games</th><th>Equipo B</th><th>Descansan</th></tr></thead>
        <tbody>`;

    fixture.forEach(([j1,j2,j3,j4], ri)=>{
      const key = `${nombre}-${ri}`;
      const res = resultadosFinal[key]||{ga:'',gb:''};
      const jugando = new Set([j1,j2,j3,j4]);
      const descansan = clasificados.filter(p=>!jugando.has(p));

      html += `<tr>
        <td style="color:var(--text3);font-size:12px">${ri+1}</td>
        <td style="text-align:left;font-weight:500">${j1} + ${j2}</td>
        <td>
          <div class="games-wrap" style="justify-content:center">
            <input class="game-in" type="number" min="0" max="99" value="${res.ga}" placeholder="—"
              style="border-color:${border};width:42px"
              oninput="setResFinal('${key}','ga',this.value)">
            <span class="games-dash">—</span>
            <input class="game-in" type="number" min="0" max="99" value="${res.gb}" placeholder="—"
              style="border-color:${border};width:42px"
              oninput="setResFinal('${key}','gb',this.value)">
          </div>
        </td>
        <td style="text-align:left;font-weight:500">${j3} + ${j4}</td>
        <td style="text-align:left;font-size:11px;color:var(--text3);font-style:italic">${descansan.join(', ')||'—'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  document.getElementById('output').innerHTML = html || '<div class="empty"><div class="empty-txt">No hay suficientes jugadores para armar las copas.</div></div>';
}

// ── Init ──
document.getElementById('p-canchas').addEventListener('input', renderPlayers);
document.getElementById('p-games').addEventListener('input', updateHint);
renderPlayers();
generate();
</script>
</body>
</html>
