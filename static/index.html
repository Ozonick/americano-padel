<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Panteras Pádel 🐆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surf:#1a1a1a; --surf2:#222; --surf3:#2a2a2a;
  --brd:rgba(255,255,255,0.08); --brd2:rgba(255,255,255,0.14);
  --txt:#f0f0f0; --txt2:#888; --txt3:#444;
  --green:#29ABE2; --green-d:rgba(41,171,226,0.15);
  --blue:#0a84ff;  --blue-d:rgba(10,132,255,0.12);
  --amber:#FFD700; --amber-d:rgba(255,215,0,0.15);
  --red:#ff453a;   --red-d:rgba(255,69,58,0.12);
  --r:10px; --rsm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input{font-family:'DM Sans',sans-serif}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--brd);
  position:sticky;top:0;background:rgba(15,15,15,.94);backdrop-filter:blur(14px);z-index:100}
.hdr-logo{width:34px;height:34px;background:transparent;border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr-name{font-size:16px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--txt2)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.role-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.role-admin{background:rgba(41,171,226,.15);color:#29ABE2}
.role-viewer{background:var(--surf2);color:var(--txt2)}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--txt3);flex-shrink:0}
.ws-dot.ok{background:#29ABE2}
.layout{display:flex;min-height:calc(100vh - 61px)}
.sidebar{width:270px;min-width:270px;border-right:1px solid var(--brd);padding:18px 14px;
  overflow-y:auto;position:sticky;top:61px;height:calc(100vh - 61px)}
.main{flex:1;padding:20px;overflow-y:auto;max-width:900px}
.s-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--txt3);
  text-transform:uppercase;margin-bottom:10px;padding-left:2px}
.s-sec{margin-bottom:22px}
.nav-btn{width:100%;text-align:left;padding:9px 12px;background:transparent;
  border:none;border-radius:var(--rsm);color:var(--txt2);font-size:14px;
  display:flex;align-items:center;gap:10px;transition:all .15s;margin-bottom:2px}
.nav-btn:hover{background:var(--surf2);color:var(--txt)}
.nav-btn.active{background:var(--surf3);color:var(--txt);font-weight:500}
.nav-icon{font-size:16px;width:20px;text-align:center}
.param-row{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:var(--surf2);border-radius:var(--rsm);margin-bottom:5px}
.param-lbl{font-size:13px;color:var(--txt2)}
.p-in{width:58px;background:var(--surf3);border:1px solid var(--brd2);border-radius:5px;
  color:var(--txt);font-family:'DM Mono',monospace;font-size:13px;font-weight:500;
  text-align:center;padding:4px;outline:none}
.p-in:focus{border-color:#29ABE2}
.hint-box{background:rgba(41,171,226,.1);border:1px solid rgba(41,171,226,.25);
  border-radius:var(--rsm);padding:10px 12px;font-size:12px;color:#29ABE2;margin-top:8px;line-height:1.6}
.btn-main{width:100%;padding:10px;background:var(--green);border:none;border-radius:var(--r);
  color:#0a0a0a;font-size:14px;font-weight:600;margin-top:6px;transition:opacity .15s}
.btn-main:hover{opacity:.85}
.btn-sec{width:100%;padding:8px;background:var(--surf2);border:1px solid var(--brd);
  border-radius:var(--rsm);color:var(--txt2);font-size:13px;margin-top:5px;transition:all .15s}
.btn-sec:hover{background:var(--surf3);color:var(--txt)}
.btn-danger{width:100%;padding:8px;background:var(--red-d);border:1px solid rgba(255,69,58,.2);
  border-radius:var(--rsm);color:var(--red);font-size:13px;margin-top:5px}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  overflow:hidden;margin-bottom:12px}
.card-hdr{padding:11px 16px;border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:600}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;border:1px solid transparent}
.partido-row{display:flex;align-items:center;gap:10px;padding:11px 16px;
  border-bottom:1px solid var(--brd);transition:background .1s}
.partido-row:last-child{border-bottom:none}
.partido-row:hover{background:var(--surf2)}
.g-pill{width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.equipos{flex:1;min-width:0}
.e-names{font-size:13px;font-weight:500;line-height:1.4}
.e-sep{color:var(--txt3);margin:0 5px;font-weight:300}
.e-vs{color:var(--txt3);margin:0 8px;font-size:12px}
.descansan{font-size:11px;color:var(--txt3);font-style:italic;margin-top:2px}
.games-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.g-in{width:46px;background:var(--surf3);border:1px solid var(--brd2);border-radius:var(--rsm);
  color:var(--txt);font-family:'DM Mono',monospace;font-size:16px;font-weight:600;
  text-align:center;padding:6px 4px;outline:none;transition:border-color .15s}
.g-in:focus{box-shadow:0 0 0 3px rgba(41,171,226,.15)}
.g-in:disabled{opacity:.4;cursor:not-allowed}
.g-in::-webkit-inner-spin-button,.g-in::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.g-in{-moz-appearance:textfield}
.g-dash{color:var(--txt3);font-size:13px}
.pts-chip{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:4px}
.pos-table{width:100%;border-collapse:collapse}
.pos-table th{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.06em;
  text-transform:uppercase;padding:9px 12px;text-align:center;border-bottom:1px solid var(--brd)}
.pos-table th:nth-child(2){text-align:left}
.pos-table td{padding:10px 12px;border-bottom:1px solid var(--brd);text-align:center;font-size:13px}
.pos-table td:nth-child(2){text-align:left;font-weight:500}
.pos-table tr:last-child td{border-bottom:none}
.rk{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:800;background:var(--surf3);color:#aaa}
.rk.g{background:#C9A84C;color:#000}
.rk.s{background:#29ABE2;color:#000}
.rk.b{background:#7a5c3e;color:#fff}
.pts-val{font-family:'DM Mono',monospace;font-weight:600;font-size:15px}
.dif-p{color:var(--green)} .dif-n{color:var(--red)}
.copa-bar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;font-size:13px;font-weight:600}
.cls-list{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;border-top:1px solid var(--brd)}
.cls-chip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.jug-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.jug-num{font-size:11px;color:var(--txt3);min-width:18px;text-align:right;font-family:'DM Mono',monospace}
.jug-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.jug-in{flex:1;background:var(--surf2);border:1px solid transparent;border-radius:var(--rsm);
  color:var(--txt);font-size:13px;padding:6px 10px;outline:none}
.jug-in:focus{border-color:var(--brd2)}
.grp-sel{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rsm);
  color:var(--txt2);font-size:12px;padding:4px 6px;outline:none;width:52px}
.login-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  padding:32px;width:320px;text-align:center}
.login-title{font-size:18px;font-weight:600;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--txt2);margin-bottom:24px}
.login-in{width:100%;background:var(--surf2);border:1px solid var(--brd2);border-radius:var(--rsm);
  color:var(--txt);font-size:15px;padding:10px 14px;outline:none;margin-bottom:10px;text-align:center}
.login-in:focus{border-color:#29ABE2}
.login-err{font-size:12px;color:var(--red);margin-top:6px;min-height:16px}
.btn-ghost{background:transparent;border:1px solid var(--brd);border-radius:var(--rsm);
  color:var(--txt2);font-size:13px;padding:7px 16px;margin-top:8px}
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-ico{font-size:40px;margin-bottom:10px}
.spinner{width:24px;height:24px;border:2px solid var(--brd);border-top-color:#29ABE2;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surf3);border:1px solid var(--brd2);border-radius:var(--r);
  padding:10px 20px;font-size:13px;font-weight:500;z-index:999;
  animation:fade-in .2s ease;pointer-events:none}
@keyframes fade-in{from{opacity:0;transform:translateX(-50%) translateY(8px)}}
@media(max-width:700px){
  .sidebar{display:none;position:fixed;left:0;top:0;height:100vh;z-index:200;background:var(--bg);width:280px}
  .sidebar.open{display:block}
  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
  .mob-overlay.show{display:block}
  .main{padding:14px}
  .admin-grid{grid-template-columns:1fr}
  .mob-menu{display:flex!important}
  .e-names{font-size:12px}
  .partido-row{padding:9px 12px;gap:8px}
}
.mob-menu{display:none;align-items:center;justify-content:center;
  width:34px;height:34px;background:var(--surf2);border:1px solid var(--brd);
  border-radius:var(--rsm);color:var(--txt);font-size:18px;margin-right:4px}
</style>
</head>
<body>
<div class="mob-overlay" id="overlay" onclick="closeSidebar()"></div>
<header class="hdr">
  <button class="mob-menu" onclick="toggleSidebar()">☰</button>
  <div class="hdr-logo" style="width:40px;height:40px">
    <img src="/static/panteras.png" style="width:40px;height:40px;object-fit:contain;border-radius:6px" alt="Panteras">
  </div>
  <div>
    <div class="hdr-name" id="hdr-nombre">Panteras Pádel</div>
    <div class="hdr-sub" id="hdr-sub">Cargando...</div>
  </div>
  <div class="hdr-right">
    <div class="ws-dot" id="ws-dot" title="Conexión en tiempo real"></div>
    <span class="role-badge" id="role-badge">Viewer</span>
    <button class="btn-ghost" style="padding:5px 12px;font-size:12px" onclick="showLogin()">Admin</button>
  </div>
</header>
<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="s-sec">
    <div class="s-lbl">Vista</div>
    <button class="nav-btn active" id="nav-fixture" onclick="setFixtureView('todas')">
      <span class="nav-icon">📋</span> Fixture
    </button>
    <div id="submenu-canchas" style="margin-left:12px;margin-top:2px;display:flex;flex-direction:column;gap:2px"></div>
    <button class="nav-btn" id="nav-posiciones" onclick="setTab('posiciones')">
      <span class="nav-icon">🏆</span> Posiciones
    </button>
    <button class="nav-btn" id="nav-finales" onclick="setTab('finales')">
      <span class="nav-icon">⚡</span> Finales
    </button>
    <button class="nav-btn" id="nav-mexicano" onclick="setTab('mexicano')">
      <span class="nav-icon">🇲🇽</span> Mexicano
    </button>
    <button class="nav-btn" id="nav-triangular" onclick="setTab('triangular')">
      <span class="nav-icon">🔺</span> Triangular
    </button>
  </div>
  <div class="s-sec" id="sidebar-admin" style="display:none">
    <div class="s-lbl">Admin</div>
    <button class="nav-btn" id="nav-config" onclick="setTab('config')">
      <span class="nav-icon">⚙️</span> Configuración
    </button>
    <button class="nav-btn" id="nav-jugadores" onclick="setTab('jugadores')">
      <span class="nav-icon">👥</span> Jugadores
    </button>
    <div style="margin-top:8px;padding:8px 10px;background:var(--surf2);border-radius:var(--rsm)">
      <div style="font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Modos visibles</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);cursor:pointer;margin-bottom:6px">
        <input type="checkbox" id="toggle-mexicano" onchange="toggleModo('mexicano',this.checked)" style="accent-color:#29ABE2">
        Mexicano
      </label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);cursor:pointer">
        <input type="checkbox" id="toggle-triangular" onchange="toggleModo('triangular',this.checked)" style="accent-color:#29ABE2">
        Triangular
      </label>
    </div>
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
      <button class="btn-sec" id="btn-keepalive" onclick="toggleKeepAlive()"
        style="display:flex;align-items:center;gap:8px;justify-content:center">
        <span id="ka-dot" style="width:8px;height:8px;border-radius:50%;background:var(--txt3);flex-shrink:0"></span>
        <span id="ka-label">Mantener activo</span>
      </button>
      <button class="btn-danger" onclick="confirmReset()">🗑 Nuevo torneo</button>
    </div>
  </div>
  <div class="s-sec" id="params-display">
    <div class="s-lbl">Parámetros</div>
    <div class="param-row"><span class="param-lbl">Canchas</span><span id="p-canchas" class="pts-val" style="font-size:14px">—</span></div>
    <div class="param-row"><span class="param-lbl">Games/partido</span><span id="p-games" class="pts-val" style="font-size:14px">—</span></div>
    <div class="param-row"><span class="param-lbl">Rondas prel.</span><span id="p-rondas" class="pts-val" style="font-size:14px">—</span></div>
    <div class="param-row"><span class="param-lbl">Rondas final</span><span id="p-rondas-f" class="pts-val" style="font-size:14px">—</span></div>
  </div>
  <div class="s-sec">
    <div class="hint-box" id="hint-tiempo" style="display:none"></div>
  </div>
</aside>
<main class="main" id="main-content">
  <div class="empty"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;color:var(--txt2)">Conectando...</div></div>
</main>
</div>
<div id="login-wrap" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);align-items:center;justify-content:center">
  <div class="login-card">
    <div class="login-title">🔐 Acceso admin</div>
    <div class="login-sub">Ingresá la contraseña para editar</div>
    <input class="login-in" type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-main" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
    <br>
    <button class="btn-ghost" onclick="hideLogin()">Cancelar</button>
  </div>
</div>
<script>
const S = {
  role:'viewer', password:'', tab:'fixture', state:null, ws:null,
  jugadores_edit:[], mex:null, canchaVista:'todas', keepAlive:false, _kaTimer:null,
  modosHabilitados: {mexicano:true, triangular:true},
  tri: null,
};
const LETRAS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const COLORES=[
  {bg:'rgba(41,171,226,.16)', brd:'rgba(41,171,226,.45)', txt:'#29ABE2'},
  {bg:'rgba(255,215,0,.16)',  brd:'rgba(255,215,0,.5)',   txt:'#D4A800'},
  {bg:'rgba(255,255,255,.08)',brd:'rgba(255,255,255,.25)',txt:'#cccccc'},
  {bg:'rgba(255,69,58,.14)',  brd:'rgba(255,69,58,.35)',  txt:'#ff6b62'},
  {bg:'rgba(191,90,242,.14)', brd:'rgba(191,90,242,.35)', txt:'#bf5af2'},
  {bg:'rgba(100,210,255,.14)',brd:'rgba(100,210,255,.35)',txt:'#64d2ff'},
];

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectWS(){
  const proto = location.protocol==='https:'?'wss':'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  S.ws = ws;
  ws.onopen = ()=>{
    document.getElementById('ws-dot').classList.add('ok');
    S._ping = setInterval(()=>{ if(ws.readyState===1) ws.send('ping'); }, 20000);
  };
  ws.onmessage = (e)=>{
    const data = JSON.parse(e.data);
    if(data.type==='state') applyStateSafe(data);
    if(data.type==='mexicano_state'){ S.mex=data; if(S.tab==='mexicano') renderTab(); }
    // ignorar pings del server
  };
  ws.onclose = ()=>{
    document.getElementById('ws-dot').classList.remove('ok');
    clearInterval(S._ping);
    setTimeout(connectWS, 2000);
  };
}

function applyState(data, skipFixtureRender=false){
  const cfg = data.config||{};
  document.getElementById('hdr-nombre').textContent = cfg.torneo_nombre||'Panteras Pádel';
  document.getElementById('hdr-sub').textContent = `${data.jugadores?.length||0} jugadores · ${cfg.canchas||'?'} canchas`;
  document.getElementById('p-canchas').textContent = cfg.canchas||'—';
  document.getElementById('p-games').textContent   = cfg.games_partido||'—';
  document.getElementById('p-rondas').textContent  = cfg.rondas_prel||'—';
  document.getElementById('p-rondas-f').textContent= cfg.rondas_final||'—';

  const grupos_count = (data.grupos||[]).length;
  const submenu = document.getElementById('submenu-canchas');
  if(submenu){
    let sm = `<button class="nav-btn sub-cancha-btn ${S.canchaVista==='todas'?'active':''}"
      data-cancha="todas" onclick="setFixtureView('todas')" style="font-size:12px;padding:6px 12px">
      <span style="margin-right:6px;opacity:.5">└</span> Ver todas</button>`;
    for(let gi=0;gi<grupos_count;gi++){
      const col=['#29ABE2','#D4A800','#aaa','#ff6b62','#bf5af2','#64d2ff'][gi%6];
      sm += `<button class="nav-btn sub-cancha-btn ${S.canchaVista===gi?'active':''}"
        data-cancha="${gi}" onclick="setFixtureView(${gi})"
        style="font-size:12px;padding:6px 12px;border-left:3px solid ${col}">
        <span style="margin-right:6px;opacity:.5">└</span> Cancha ${gi+1}</button>`;
    }
    submenu.innerHTML = sm;
  }

  if(data.sugerencia){
    const s=data.sugerencia, box=document.getElementById('hint-tiempo');
    box.style.display='block';
    box.innerHTML=`⏱ <strong>${cfg.tiempo_cancha||90} min</strong> de cancha<br>
      Sugerido: <strong>${s.rondas_prel} rondas</strong> prel + ${s.rondas_final} final<br>
      ~${s.mins_x_partido} min/partido · Tiempo est: ${s.tiempo_total_est} min`;
  }
  if(skipFixtureRender && S.tab==='fixture') updatePtsChips(data);
  else renderTab();
}

function updatePtsChips(data){
  const {grupos,fixtures_prel,resultados}=data;
  if(!grupos) return;
  grupos.forEach((grupo,gi)=>{
    (fixtures_prel[gi]||[]).forEach(([j1,j2,j3,j4],ri)=>{
      const res=(resultados||{})[`prel-${gi}-${ri}`]||{};
      if(res.ga==null||res.gb==null) return;
      const ga=+res.ga,gb=+res.gb;
      const p1=ga>gb?'3pts':ga===gb?'1pt':'0pts';
      const p2=gb>ga?'3pts':ga===gb?'1pt':'0pts';
      const el=document.getElementById(`chips-${gi}-${ri}`);
      if(el) el.innerHTML=chipsHTML(p1,p2);
    });
  });
}

function chipsHTML(p1,p2){
  const cs=p=>`${p==='3pts'?'background:#39FF14;color:#000;font-weight:800':p==='1pt'?'background:rgba(255,215,0,.3);color:#FFD700;font-weight:700':'background:rgba(255,255,255,.08);color:#666'};border-radius:4px;padding:2px 8px;font-size:10px`;
  return `<span style="${cs(p1)}">${p1}</span><span style="color:var(--txt3);font-size:9px;margin:0 3px">vs</span><span style="${cs(p2)}">${p2}</span>`;
}

function setFixtureView(cancha){
  S.tab='fixture'; S.canchaVista=cancha;
  document.querySelectorAll('.sub-cancha-btn').forEach(b=>b.classList.toggle('active',b.dataset.cancha==String(cancha)));
  document.getElementById('nav-fixture')?.classList.add('active');
  closeSidebar(); renderTab();
}

function setTab(tab){
  S.tab=tab;
  if(tab!=='fixture') S.canchaVista='todas';

            <div class="games-wrap">

                data-pair="${gi}-${r}" data-side="a" data-total="${ng}" data-key="${key}"

// ── AUTOFILL — limpio, sin ambigüedad ──────────────────────────────────────
// Todos los datos vienen del dataset del input, no de parámetros externos
function autoFill(inputEl){
  const val = parseInt(inputEl.value);
  const total = parseInt(inputEl.dataset.total);
  const pair  = inputEl.dataset.pair;
  const side  = inputEl.dataset.side;
  const key   = inputEl.dataset.key;

  if(isNaN(val) || val < 0) return;

  // Completar el otro campo
  const otroSide = side==='a'?'b':'a';
  const elOtro = document.querySelector(`input[data-pair="${pair}"][data-side="${otroSide}"]`);
  if(elOtro && val <= total){
    elOtro.value = total - val;
    // Flash verde en el campo completado
    elOtro.style.boxShadow = '0 0 0 2px #39FF14';
    setTimeout(()=>{ elOtro.style.boxShadow=''; }, 350);
  }

  // Calcular ga/gb
  const ga = side==='a' ? val : (elOtro ? parseInt(elOtro.value)||0 : total-val);
  const gb = side==='b' ? val : (elOtro ? parseInt(elOtro.value)||0 : total-val);

  // Chips inmediatos
  const [gi,ri] = pair.split('-');
  const chipsEl = document.getElementById(`chips-${gi}-${ri}`);
  if(chipsEl && ga+gb > 0){
    const p1=ga>gb?'3pts':ga===gb?'1pt':'0pts';
    const p2=gb>ga?'3pts':ga===gb?'1pt':'0pts';
    chipsEl.innerHTML = chipsHTML(p1,p2);
  }

  // Guardar solo cuando ambos campos tienen valor válido
  const gaFinal = side==='a' ? val : parseInt(elOtro?.value);
  const gbFinal = side==='b' ? val : parseInt(elOtro?.value);
  if(isNaN(gaFinal)||isNaN(gbFinal)) return;

  clearTimeout(inputEl._t);
  inputEl._t = setTimeout(()=>{
    api('/api/resultado',{password:S.password,id:key,games_a:gaFinal,games_b:gbFinal,fase:'prel'})
      .then(r=>{ if(r.ok) toast('✓ Guardado'); });
  }, 400);
}

// ── AUTOFILL MEXICANO — misma lógica con data-pair ─────────────────────────
function autoFillMex(inputEl){
  const val   = parseInt(inputEl.value);
  const total = parseInt(inputEl.dataset.total);
  const pair  = inputEl.dataset.pair;
  const side  = inputEl.dataset.side;

// ── POSICIONES ──────────────────────────────────────────────────────────────
function calcStats(){
  const {grupos,fixtures_prel,resultados}=S.state; const stats={};
  (grupos||[]).forEach((g,gi)=>{
    g.forEach(j=>{stats[j]={pj:0,gf:0,gc:0,pts:0,gi};});
    (fixtures_prel[gi]||[]).forEach(([j1,j2,j3,j4],ri)=>{
      const res=(resultados||{})[`prel-${gi}-${ri}`];
      if(!res||res.ga==null) return;
      const ga=+res.ga,gb=+res.gb;
      [j1,j2].forEach(j=>{if(stats[j]){stats[j].gf+=ga;stats[j].gc+=gb;stats[j].pj++;}});
      [j3,j4].forEach(j=>{if(stats[j]){stats[j].gf+=gb;stats[j].gc+=ga;stats[j].pj++;}});
      const p1=ga>gb?3:ga===gb?1:0,p2=gb>ga?3:ga===gb?1:0;
      [j1,j2].forEach(j=>{if(stats[j])stats[j].pts+=p1;});
      [j3,j4].forEach(j=>{if(stats[j])stats[j].pts+=p2;});
    });
  });
  return stats;
}

function sortGrupo(grupo,stats){
  return [...grupo].sort((a,b)=>{
    const sa=stats[a]||{},sb=stats[b]||{};
    if((sb.pts||0)!==(sa.pts||0)) return (sb.pts||0)-(sa.pts||0);
    const da=(sa.gf||0)-(sa.gc||0),db=(sb.gf||0)-(sb.gc||0);
    if(db!==da) return db-da;
    return (sb.gf||0)-(sa.gf||0);
  });
}

function renderPosiciones(){
  const {grupos}=S.state;
  if(!grupos||!grupos.length) return noJugadores();
  const stats=calcStats(); let html='';
  grupos.forEach((grupo,gi)=>{
    const col=COLORES[gi%COLORES.length], sorted=sortGrupo(grupo,stats);
    html+=`<div class="card"><div class="card-hdr">
      <span class="card-title">Grupo ${LETRAS[gi]}</span>
      <span class="badge" style="background:${col.bg};color:${col.txt};border-color:${col.brd}">${grupo.length} jugadores</span>
    </div>
    <table class="pos-table"><thead><tr><th>Pos</th><th>Jugador</th><th>PJ</th><th>GF</th><th>GC</th><th>Dif</th><th>Pts</th></tr></thead><tbody>`;
    sorted.forEach((j,pos)=>{
      const s=stats[j]||{pj:0,gf:0,gc:0,pts:0},dif=s.gf-s.gc;
      html+=`<tr>
        <td><span class="rk ${pos===0?'g':pos===1?'s':pos===2?'b':''}">${pos+1}</span></td>
        <td>${j}</td>
        <td style="color:#7a9bbf">${s.pj}</td>
        <td style="color:#5db896">${s.gf}</td>
        <td style="color:#c47a7a">${s.gc}</td>
        <td class="${dif>0?'dif-p':dif<0?'dif-n':''}">${dif>0?'+':''}${dif}</td>
        <td><span class="pts-val" style="color:${col.txt}">${s.pts}</span></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  return html;
}

// ── FINALES ──────────────────────────────────────────────────────────────────
function renderFinales(){
  const {grupos,resultados}=S.state;
  if(!grupos||!grupos.length) return noJugadores();
  const stats=calcStats();
  const copasDef=[
    {id:'oro',   emoji:'🥇',label:'Copa Oro',  posIdx:[0,1],color:'#C9A84C',bg:'rgba(201,168,76,.12)',brd:'rgba(201,168,76,.4)'},
    {id:'plata', emoji:'🥈',label:'Copa Plata',posIdx:[2,3],color:'#4da6ff',bg:'rgba(10,132,255,.1)', brd:'rgba(10,132,255,.35)'},
    {id:'bronce',emoji:'🥉',label:'Copa Bronce',posIdx:[4,5],color:'#c4956a',bg:'rgba(196,149,106,.12)',brd:'rgba(196,149,106,.4)'},
  ];
  const dis=S.role!=='admin'?'disabled':''; let html='';

  copasDef.forEach(({id,emoji,label,posIdx,color,bg,brd})=>{
    const cpg=grupos.map(g=>sortGrupo(g,stats));
    const candidatos=[];
    posIdx.forEach(pos=>cpg.forEach(sg=>{ if(sg[pos]) candidatos.push(sg[pos]); }));
    if(!candidatos.length) return;

    const rankGlobal=[...candidatos].sort((a,b)=>{
      const sa=stats[a]||{},sb=stats[b]||{};
      if((sb.pts||0)!==(sa.pts||0)) return (sb.pts||0)-(sa.pts||0);
      return ((sb.gf||0)-(sb.gc||0))-((sa.gf||0)-(sa.gc||0));
    });
    const duos=[];
    for(let i=0;i+1<rankGlobal.length;i+=2) duos.push([rankGlobal[i],rankGlobal[i+1]]);
    const partidos=[];
    for(let i=0;i<duos.length;i++) for(let j=i+1;j<duos.length;j++) partidos.push({duoA:duos[i],duoB:duos[j],idx:partidos.length});

    html+=`<div class="card" style="margin-bottom:14px">
      <div class="copa-bar" style="background:${bg};border-bottom:2px solid ${brd}">
        <span style="color:${color};font-size:14px;font-weight:700">${emoji} ${label}</span>
        <span style="font-size:11px;color:${color};opacity:.7">Round Robin · G = Ganó · P = Perdió</span>
      </div>
      <div style="padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;flex-wrap:wrap;gap:8px">`;
    duos.forEach((duo,di)=>{
      const pts=(stats[duo[0]]?.pts||0)+(stats[duo[1]]?.pts||0);
      html+=`<div style="background:${bg};border:1px solid ${brd};border-radius:8px;padding:6px 12px;min-width:140px">
        <div style="font-size:10px;font-weight:700;color:${color};letter-spacing:.06em;margin-bottom:4px">DUO ${di+1} · ${pts} pts</div>
        <div style="font-size:13px;font-weight:600">${duo[0]}</div>
        <div style="font-size:13px;font-weight:600">${duo[1]}</div>
      </div>`;
    });
    html+=`</div>`;

    if(partidos.length){
      html+=`<div style="display:flex;flex-direction:column">`;
      partidos.forEach(({duoA,duoB,idx})=>{
        const key=`final-${id}-${idx}`,res=(resultados||{})[key]||{},rv=res.ga;
        const bs=(val)=>`padding:6px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid ${rv==val?color:'var(--brd2)'};background:${rv==val?bg:'transparent'};color:${rv==val?color:'var(--txt2)'};${dis?'opacity:.5;cursor:not-allowed':''}`;
        const duoNames=(duo)=>`<div style="display:flex;flex-direction:column;align-items:flex-start;gap:1px">
            <span style="font-weight:600;font-size:13px">${duo[0]}</span>
            <span style="color:var(--txt3);font-size:10px;line-height:1">+</span>
            <span style="font-weight:600;font-size:13px">${duo[1]}</span>
          </div>`;
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid var(--brd)">
          ${duoNames(duoA)}
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <button style="${bs(1)}" ${dis} onclick="guardarFinal('${key}',1)">G</button>
            <span style="color:var(--txt3);font-size:12px">vs</span>
            <button style="${bs(2)}" ${dis} onclick="guardarFinal('${key}',2)">G</button>
          </div>
          ${duoNames(duoB).replace('align-items:flex-start','align-items:flex-end')}
        </div>`;
      });
      html+=`</div>`;
    }

    const cs={};
    duos.forEach(duo=>{cs[duo.join('+')]={duo,g:0,p:0};});
    partidos.forEach(({duoA,duoB,idx})=>{
      const rv=(resultados||{})[`final-${id}-${idx}`]?.ga;
      if(!rv) return;
      const kA=duoA.join('+'),kB=duoB.join('+');
      if(rv==1){cs[kA].g++;cs[kB].p++;}else{cs[kB].g++;cs[kA].p++;}
    });
    const rk=Object.values(cs).sort((a,b)=>b.g-a.g);
    if(rk.some(r=>r.g>0||r.p>0)){
      html+=`<div style="padding:10px 14px;border-top:1px solid var(--brd)">
        <div style="font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.06em;margin-bottom:8px">POSICIONES COPA</div>
        <div style="display:flex;flex-direction:column;gap:4px">`;
      rk.forEach((r,pos)=>{
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:6px;background:${pos===0?bg:'transparent'}">
          <span style="width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:${pos===0?color:'var(--surf3)'};color:${pos===0?'#000':'var(--txt2)'}">${pos+1}</span>
          <span style="font-weight:500;font-size:13px">${r.duo[0]} + ${r.duo[1]}</span>
          <span style="margin-left:auto;font-size:12px">
            <span style="color:#39FF14;font-weight:700">${r.g}G</span>
            <span style="color:var(--txt3);margin:0 4px">·</span>
            <span style="color:var(--red)">${r.p}P</span>
          </span>
        </div>`;
      });
      html+=`</div></div>`;
    }
    html+=`</div>`;
  });
  return html||`<div class="empty"><div class="empty-ico">⏳</div><div style="font-size:14px;margin-top:8px">Jugá la fase preliminar para ver las finales.</div></div>`;
}

      <button class="badge" style="background:var(--green-d);color:var(--green);cursor:pointer;border:none" onclick="saveJugadores()">💾 Guardar</button>
    </div></div>
    <div style="padding:14px">
      <div style="font-size:12px;color:var(--txt2);margin-bottom:12px">
        Escribí los nombres. El grupo se asigna automáticamente según el orden.<br>
        Después de sortear podés ajustar el grupo de cada jugador.
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-bottom:14px">`;
  S.jugadores_edit.forEach((j,i)=>{
    const col=COLORES[(j.grupo||0)%COLORES.length];
    html+=`<div class="jug-row" style="width:100%">
      <span class="jug-num">${i+1}</span>
      <span class="jug-dot" style="background:${col.txt}"></span>
      <input class="jug-in" type="text" value="${j.nombre||''}" placeholder="Jugador ${i+1}" oninput="S.jugadores_edit[${i}].nombre=this.value" style="min-width:0;flex:1">
      <select class="grp-sel" onchange="changeGrupo(${i},+this.value)" style="flex-shrink:0">
        ${Array.from({length:nc},(_,g)=>`<option value="${g}" ${(j.grupo||0)===g?'selected':''}>${LETRAS[g]}</option>`).join('')}
      </select>
    </div>`;
  });
  html+=`</div><div style="display:flex;gap:8px">
    <button class="btn-sec" onclick="addJug()">+ Agregar jugador</button>
    <button class="btn-sec" onclick="removeJug()">− Quitar último</button>
  </div></div></div>`;
  return html;
}

function addJug(){const nc=parseInt(S.state?.config?.canchas)||3,n=S.jugadores_edit.length,tam=Math.max(4,Math.round((n+1)/nc));S.jugadores_edit.push({nombre:'',grupo:Math.floor(n/tam),orden:n});renderTab();}
function removeJug(){if(S.jugadores_edit.length>4){S.jugadores_edit.pop();renderTab();}}
async function shuffleJugadores(){const nombres=S.jugadores_edit.map(j=>j.nombre).filter(n=>n.trim());if(!nombres.length){toast('Ingresá nombres primero');return;}const res=await api('/api/shuffle',{password:S.password,nombres});if(res.ok){S.jugadores_edit=[];toast('🔀 Grupos sorteados');}}
async function saveJugadores(){const jug=S.jugadores_edit.filter(j=>j.nombre.trim()).map((j,i)=>({nombre:j.nombre.trim(),grupo:j.grupo||0,orden:i}));const res=await api('/api/jugadores',{password:S.password,jugadores:jug});if(res.ok){S.jugadores_edit=[];toast('✓ Jugadores guardados');}}

function confirmReset(){if(confirm('¿Empezar nuevo torneo? Se borran todos los puntajes y jugadores.')){api('/api/reset',{password:S.password}).then(r=>{if(r.ok){S.jugadores_edit=[];toast('Torneo reseteado');}});}}
function showLogin(){if(S.role==='admin'){S.role='viewer';S.password='';updateRoleUI();return;}document.getElementById('login-wrap').style.display='flex';document.getElementById('login-pass').value='';document.getElementById('login-err').textContent='';setTimeout(()=>document.getElementById('login-pass').focus(),50);}

async function api(path,body){try{const res=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok){const e=await res.json();toast('Error: '+(e.detail||res.status));return{ok:false};}return await res.json();}catch(e){toast('Error de conexión');return{ok:false};}}
function noJugadores(){return `<div class="empty"><div class="empty-ico">👥</div><div style="font-size:14px;margin-top:8px">No hay jugadores cargados.</div></div>`;}
let _toastTimer;

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
function changeGrupo(idx,grupo){S.jugadores_edit[idx].grupo=grupo;const rows=document.querySelectorAll('.jug-row');if(rows[idx]){const dot=rows[idx].querySelector('.jug-dot');if(dot)dot.style.background=COLORES[grupo%COLORES.length].txt;}}

async function loadMexState(){try{const res=await fetch('/api/mexicano/state');S.mex=await res.json();}catch(e){S.mex=null;}}

function renderMexicano(){
  if(!S.mex){loadMexState().then(renderTab);return `<div class="empty"><div class="spinner"></div></div>`;}
  const m=S.mex,cfg=m.config||{},estado=cfg.estado||'idle',ronda=m.ronda_actual||0,rondas=m.rondas_total||7,games=parseInt(cfg.games)||16,dis=S.role!=='admin'?'disabled':'';
  let html=`<div class="card" style="margin-bottom:12px"><div class="card-hdr">
    <span class="card-title">🇲🇽 Modo Mexicano</span>
    <span class="badge" style="background:${estado==='jugando'?'rgba(41,171,226,.15)':estado==='finalizado'?'rgba(76,217,100,.15)':'var(--surf3)'};color:${estado==='jugando'?'#29ABE2':estado==='finalizado'?'#4cd964':'var(--txt2)'}">
      ${estado==='idle'?'Sin iniciar':estado==='jugando'?`Ronda ${ronda} / ${rondas}`:'🏆 Finalizado'}
    </span></div>`;

  if(S.role==='admin'&&estado==='idle'){
    html+=`<div style="padding:14px;display:grid;gap:8px">
      <div class="param-row"><span class="param-lbl">Canchas simultáneas</span><input class="p-in" id="mex-canchas" type="number" min="1" max="8" value="${cfg.canchas||3}"></div>
      <div class="param-row"><span class="param-lbl">Cantidad de rondas</span><input class="p-in" id="mex-rondas" type="number" min="1" max="20" value="${cfg.rondas||7}"></div>
      <div class="param-row"><span class="param-lbl">Games por partido</span><input class="p-in" id="mex-games" type="number" min="4" max="40" value="${cfg.games||16}"></div>
      <div style="font-size:11px;color:var(--txt2);padding:0 2px">Primera ronda sorteada aleatoriamente. Las siguientes según ranking.</div>
      <button class="btn-main" onclick="mexGuardarConfig()">Guardar y comenzar torneo</button>
    </div>`;
  }
  if(S.role==='admin'&&estado==='jugando'){
    html+=`<div style="padding:10px 14px;display:flex;gap:8px;border-bottom:1px solid var(--brd)">
      <button class="btn-sec" style="flex:1" onclick="mexSiguienteRonda()" ${m.ronda_completa&&ronda<rondas?'':'disabled'}>
        ➡️ Siguiente ronda ${ronda<rondas?`(${ronda+1}/${rondas})`:''}
      </button>
      <button class="btn-sec" style="color:var(--red)" onclick="mexReset()">🗑 Reiniciar</button>
    </div>
    ${!m.ronda_completa?`<div style="padding:6px 14px;font-size:11px;color:var(--amber)">⚠️ Cargá todos los resultados de la ronda ${ronda} para avanzar</div>`:''}`;
  }
  html+=`</div>`;

  if(estado==='idle'&&S.role!=='admin') return html+`<div class="empty"><div class="empty-ico">⏳</div><div style="font-size:14px;margin-top:8px">El admin aún no inició el torneo mexicano.</div></div>`;
  if(estado==='idle') return html;

  if(m.partidos_actuales?.length){
    const js=new Set(m.partidos_actuales.flatMap(p=>[p.j1,p.j2,p.j3,p.j4]));
    const desc=(m.jugadores||[]).map(j=>j.nombre).filter(j=>!js.has(j));
    html+=`<div class="card" style="margin-bottom:12px"><div class="card-hdr">
      <span class="card-title">Ronda ${ronda} — Partidos en juego</span>
      <span class="badge" style="background:rgba(41,171,226,.1);color:#29ABE2">hasta ${games} games</span>
    </div>
    ${desc.length?`<div style="padding:6px 16px;font-size:11px;color:var(--txt3);font-style:italic;border-bottom:1px solid var(--brd)">Descansan esta ronda: ${desc.join(', ')}</div>`:''}`;

    m.partidos_actuales.forEach(p=>{
      const ga=p.games_a??'',gb=p.games_b??'';
      let p1='',p2='';
      if(ga!==''&&gb!==''){const a=+ga,b=+gb;p1=a>b?'3pts':a===b?'1pt':'0pts';p2=b>a?'3pts':a===b?'1pt':'0pts';}
      html+=`<div class="partido-row" style="border-left:4px solid #29ABE2;padding-left:12px">
        <span class="g-pill" style="background:rgba(41,171,226,.15);color:#29ABE2;font-weight:800">${p.cancha}</span>
        <div class="equipos"><div class="e-names"><strong>${p.j1}</strong><span class="e-sep">+</span><strong>${p.j2}</strong><span class="e-vs">vs</span><strong>${p.j3}</strong><span class="e-sep">+</span><strong>${p.j4}</strong></div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="games-wrap">
            <input class="g-in" type="number" min="0" max="${games}" value="${ga}" placeholder="—"
              style="border-color:rgba(41,171,226,.4)" ${dis}
              data-pair="mex-${p.cancha}" data-side="a" data-total="${games}" data-resid="${p.id}"
              oninput="autoFillMex(this)">
            <span class="g-dash">—</span>
            <input class="g-in" type="number" min="0" max="${games}" value="${gb}" placeholder="—"
              style="border-color:rgba(41,171,226,.4)" ${dis}
              data-pair="mex-${p.cancha}" data-side="b" data-total="${games}" data-resid="${p.id}"
              oninput="autoFillMex(this)">
          </div>
          ${p1&&p2?`<div style="display:flex;gap:4px;font-size:11px">${chipsHTML(p1,p2)}</div>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(m.ranking?.length){
    html+=`<div class="card"><div class="card-hdr"><span class="card-title">🏆 Ranking acumulado</span></div>
      <table class="pos-table"><thead><tr><th>Pos</th><th>Jugador</th><th>PJ</th><th>GF</th><th>GC</th><th>Dif</th><th>Pts</th></tr></thead><tbody>`;
    m.ranking.forEach((j,pos)=>{
      const s=m.stats[j]||{pj:0,gf:0,gc:0,pts:0},dif=s.gf-s.gc;
      html+=`<tr>
        <td><span class="rk ${pos===0?'g':pos===1?'s':''}">${pos+1}</span></td>
        <td>${j}</td>
        <td style="color:#7a9bbf">${s.pj}</td><td style="color:#5db896">${s.gf}</td><td style="color:#c47a7a">${s.gc}</td>
        <td class="${dif>0?'dif-p':dif<0?'dif-n':''}">${dif>0?'+':''}${dif}</td>
        <td><span class="pts-val" style="color:#29ABE2">${s.pts}</span></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  if(estado==='finalizado'){
    const g=m.ranking[0];
    html+=`<div class="card" style="margin-top:12px;border-color:#29ABE2"><div style="padding:20px;text-align:center">
      <div style="font-size:32px;margin-bottom:8px">🏆</div>
      <div style="font-size:18px;font-weight:600;color:#29ABE2">¡Campeón!</div>
      <div style="font-size:22px;font-weight:700;margin-top:4px">${g}</div>
      <div style="font-size:13px;color:var(--txt2);margin-top:8px">${m.stats[g]?.pts||0} pts · ${m.stats[g]?.gf||0} games a favor</div>
      ${S.role==='admin'?`<button class="btn-sec" style="margin-top:12px;width:auto;padding:8px 20px" onclick="mexReset()">Jugar de nuevo</button>`:''}
    </div></div>`;
  }
  return html;
}

  const r1=await api('/api/mexicano/config',{password:S.password,canchas:+canchas,rondas:+rondas,games:+games});

async function mexReset(){if(!confirm('¿Reiniciar el torneo mexicano?')) return;const res=await api('/api/mexicano/reset',{password:S.password});if(res.ok)toast('Torneo mexicano reiniciado');}

function toggleKeepAlive(){

function _aplicarKeepAlive(){
  const dot=document.getElementById('ka-dot');

// ── TOGGLE MODOS ─────────────────────────────────────────────────────────────
function toggleModo(modo, habilitado){
  S.modosHabilitados[modo] = habilitado;
  try{ localStorage.setItem('modos', JSON.stringify(S.modosHabilitados)); }catch(e){}
  // Mostrar/ocultar botón en sidebar
  const btn = document.getElementById(`nav-${modo}`);
  if(btn) btn.style.display = habilitado ? '' : 'none';
  // Si estaba en ese tab, volver a fixture
  if(!habilitado && S.tab === modo) setTab('fixture');
}

function restaurarModos(){
  try{
    const saved = JSON.parse(localStorage.getItem('modos')||'{}');
    Object.assign(S.modosHabilitados, saved);
  }catch(e){}
  ['mexicano','triangular'].forEach(modo=>{
    const btn = document.getElementById(`nav-${modo}`);
    const chk = document.getElementById(`toggle-${modo}`);
    const hab = S.modosHabilitados[modo] !== false;
    if(btn) btn.style.display = hab ? '' : 'none';
    if(chk) chk.checked = hab;
  });
}

// ── TRIANGULAR ────────────────────────────────────────────────────────────────
// Sistema de puntos pádel: 0 → 15 → 30 → 40 → Juego (con deuce)
// Primero en ganar 6 juegos gana el set (tie-break en 6-6)
// 3 parejas, cada una juega contra las otras 2. Gana el triangular quien gane más sets.

const PUNTOS_SEQ = [0, 15, 30, 40];

function puntosLabel(p){ return p >= 3 ? (p === 3 ? '40' : 'AD') : PUNTOS_SEQ[p].toString(); }

function renderTriangular(){
  // Estado guardado en S.tri (localStorage para persistir)
  if(!S.tri) S.tri = cargarTri();
  const tri = S.tri;
  const dis = S.role !== 'admin' ? 'disabled' : '';

  let html = `<div class="card" style="margin-bottom:12px">
    <div class="card-hdr">
      <span class="card-title">🔺 Modo Triangular</span>
      <span class="badge" style="background:${tri.estado==='jugando'?'rgba(41,171,226,.15)':'var(--surf3)'};color:${tri.estado==='jugando'?'#29ABE2':'var(--txt2)'}">
        ${tri.estado==='idle'?'Sin iniciar':tri.estado==='jugando'?'En juego':'🏆 Finalizado'}
      </span>
    </div>`;

  // ── Setup (admin, idle) ──
  if(S.role==='admin' && tri.estado==='idle'){
    html += `<div style="padding:14px;display:flex;flex-direction:column;gap:10px">
      <div style="font-size:12px;color:var(--txt2)">3 parejas fijas · Cada pareja juega contra las otras 2 · Sistema de puntos pádel (0-15-30-40)</div>`;

    for(let p=0;p<3;p++){
      const cols = ['#29ABE2','#D4A800','#ff6b62'];
      html += `<div style="border:1px solid ${cols[p]}40;border-radius:8px;padding:10px 12px">
        <div style="font-size:10px;font-weight:700;color:${cols[p]};letter-spacing:.08em;margin-bottom:8px">PAREJA ${p+1}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input class="p-in" style="flex:1;min-width:80px;text-align:left;width:auto"
            placeholder="Jugador A" value="${tri.parejas[p]?.[0]||''}"
            oninput="triSetJugador(${p},0,this.value)">
          <input class="p-in" style="flex:1;min-width:80px;text-align:left;width:auto"
            placeholder="Jugador B" value="${tri.parejas[p]?.[1]||''}"
            oninput="triSetJugador(${p},1,this.value)">
        </div>
      </div>`;
    }

    html += `<div style="display:flex;gap:8px">
      <button class="btn-sec" onclick="triSortear()" style="flex:1">🔀 Sortear parejas</button>
      <button class="btn-main" onclick="triIniciar()" style="flex:1;margin-top:0">▶ Iniciar</button>
    </div></div>`;
  }

  // ── Botones admin jugando ──
  if(S.role==='admin' && tri.estado==='jugando'){
    html += `<div style="padding:8px 14px;border-bottom:1px solid var(--brd)">
      <button class="btn-sec" style="color:var(--red);margin-top:0" onclick="triReset()">🗑 Reiniciar triangular</button>
    </div>`;
  }
  html += `</div>`;

  if(tri.estado==='idle' && S.role!=='admin')
    return html + `<div class="empty"><div class="empty-ico">⏳</div><div style="font-size:14px;margin-top:8px">El admin aún no inició el triangular.</div></div>`;
  if(tri.estado==='idle') return html;

  // ── Parejas ──
  const cols = ['#29ABE2','#D4A800','#ff6b62'];
  const colsBg = ['rgba(41,171,226,.12)','rgba(255,215,0,.12)','rgba(255,69,58,.12)'];
  html += `<div style="display:flex;gap:8px;padding:10px 14px;flex-wrap:wrap;border-bottom:1px solid var(--brd)">`;
  tri.parejas.forEach((par,pi)=>{
    const sets = tri.partidos.filter(pt=>pt.ganador!==null).reduce((acc,pt)=>{
      if(pt.pA===pi && pt.ganador===0) acc++;
      if(pt.pB===pi && pt.ganador===1) acc++;
      return acc;
    },0);
    html += `<div style="background:${colsBg[pi]};border:1px solid ${cols[pi]}40;border-radius:8px;padding:8px 12px;min-width:120px;flex:1">
      <div style="font-size:10px;font-weight:700;color:${cols[pi]};margin-bottom:4px">PAREJA ${pi+1} · ${sets} set${sets!==1?'s':''}</div>
      <div style="font-weight:600;font-size:13px">${par[0]}</div>
      <div style="font-weight:600;font-size:13px">${par[1]}</div>
    </div>`;
  });
  html += `</div>`;

  // ── Partidos ──
  html += `<div style="display:flex;flex-direction:column">`;
  tri.partidos.forEach((pt,pti)=>{
    const parA = tri.parejas[pt.pA], parB = tri.parejas[pt.pB];
    const ganado = pt.ganador !== null;
    const juegosA = pt.juegos[0], juegosB = pt.juegos[1];

    // Puntos actuales del juego en curso
    const pA = pt.puntos[0], pB = pt.puntos[1];
    const esDeuce = pA >= 3 && pB >= 3;
    const lblA = esDeuce && pA > pB ? 'AD' : puntosLabel(pA);
    const lblB = esDeuce && pB > pA ? 'AD' : puntosLabel(pB);

    html += `<div style="padding:12px 14px;border-bottom:1px solid var(--brd);${ganado?'opacity:.7':''}">
      <div style="font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.06em;margin-bottom:8px">
        PARTIDO ${pti+1} ${ganado?'✓':'▶ EN JUEGO'}
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">

        <!-- Pareja A -->
        <div style="flex:1;min-width:100px">
          <div style="font-weight:600;font-size:13px;color:${cols[pt.pA]}">${parA[0]}</div>
          <div style="font-size:10px;color:var(--txt3)">+</div>
          <div style="font-weight:600;font-size:13px;color:${cols[pt.pA]}">${parA[1]}</div>
        </div>

        <!-- Marcador central -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
          <!-- Juegos -->
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;
              color:${juegosA>juegosB?cols[pt.pA]:'var(--txt)'}">${juegosA}</span>
            <span style="color:var(--txt3);font-size:12px">juegos</span>
            <span style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;
              color:${juegosB>juegosA?cols[pt.pB]:'var(--txt)'}">${juegosB}</span>
          </div>
          <!-- Puntos actuales -->
          ${!ganado ? `<div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:13px;font-weight:600;color:${pA>pB?cols[pt.pA]:'var(--txt2)'}">${lblA}</span>
            <span style="color:var(--txt3);font-size:11px">-</span>
            <span style="font-size:13px;font-weight:600;color:${pB>pA?cols[pt.pB]:'var(--txt2)'}">${lblB}</span>
          </div>` : `<div style="font-size:11px;color:${cols[pt.ganador===0?pt.pA:pt.pB]};font-weight:600">
            ${tri.parejas[pt.ganador===0?pt.pA:pt.pB][0]} + ${tri.parejas[pt.ganador===0?pt.pA:pt.pB][1]} ganaron
          </div>`}
          <!-- Botones de punto (solo admin, partido en curso) -->
          ${!ganado && S.role==='admin' ? `<div style="display:flex;gap:6px;margin-top:4px">
            <button onclick="triPunto(${pti},0)" style="padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;
              border:2px solid ${cols[pt.pA]};background:${colsBg[pt.pA]};color:${cols[pt.pA]};cursor:pointer">
              +1 ${parA[0].split(' ')[0]}
            </button>
            <button onclick="triPunto(${pti},1)" style="padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;
              border:2px solid ${cols[pt.pB]};background:${colsBg[pt.pB]};color:${cols[pt.pB]};cursor:pointer">
              +1 ${parB[0].split(' ')[0]}
            </button>
          </div>
          <button onclick="triDeshacerPunto(${pti})" style="font-size:11px;color:var(--txt3);background:transparent;border:none;cursor:pointer;margin-top:2px">↩ Deshacer</button>
          ` : ''}
        </div>

        <!-- Pareja B -->
        <div style="flex:1;min-width:100px;text-align:right">
          <div style="font-weight:600;font-size:13px;color:${cols[pt.pB]}">${parB[0]}</div>
          <div style="font-size:10px;color:var(--txt3)">+</div>
          <div style="font-weight:600;font-size:13px;color:${cols[pt.pB]}">${parB[1]}</div>
        </div>

      </div>
    </div>`;
  });
  html += `</div>`;

  // ── Resultado final ──
  if(tri.estado==='finalizado'){
    const wins = tri.parejas.map((_,pi)=>
      tri.partidos.filter(pt=>(pt.pA===pi&&pt.ganador===0)||(pt.pB===pi&&pt.ganador===1)).length
    );
    const maxW = Math.max(...wins);
    const campeones = tri.parejas.filter((_,pi)=>wins[pi]===maxW);
    html += `<div style="padding:20px;text-align:center;border-top:1px solid var(--brd)">
      <div style="font-size:28px;margin-bottom:8px">🏆</div>
      <div style="font-size:16px;font-weight:700;color:#29ABE2;margin-bottom:4px">
        ${campeones.length>1?'¡Empate!':'¡Campeón triangular!'}
      </div>
      <div style="font-size:18px;font-weight:700">${campeones.map(c=>c.join(' + ')).join(' · ')}</div>
      <div style="font-size:12px;color:var(--txt2);margin-top:8px">
        ${tri.parejas.map((p,pi)=>`${p.join('+')} · ${wins[pi]} set${wins[pi]!==1?'s':''}`).join(' | ')}
      </div>
      ${S.role==='admin'?`<button class="btn-sec" style="margin-top:12px;width:auto;padding:8px 20px" onclick="triReset()">Jugar de nuevo</button>`:''}
    </div>`;
  }

  return html;
}

// ── Lógica puntaje triangular ──────────────────────────────────────────────

function cargarTri(){
  try{
    const saved = localStorage.getItem('tri');
    if(saved) return JSON.parse(saved);
  }catch(e){}
  return triEstadoInicial();
}

function triEstadoInicial(){
  return {
    estado: 'idle',
    parejas: [['',''],['',''],['','']],
    // Partidos: P0vsP1, P1vsP2, P0vsP2
    partidos: [
      {pA:0,pB:1,juegos:[0,0],puntos:[0,0],historial:[],ganador:null},
      {pA:1,pB:2,juegos:[0,0],puntos:[0,0],historial:[],ganador:null},
      {pA:0,pB:2,juegos:[0,0],puntos:[0,0],historial:[],ganador:null},
    ]
  };
}

function guardarTri(){
  try{ localStorage.setItem('tri', JSON.stringify(S.tri)); }catch(e){}
}

function triSetJugador(pareja, pos, nombre){
  S.tri.parejas[pareja][pos] = nombre;
  guardarTri();
}

function triSortear(){
  if(!S.state?.jugadores?.length){ toast('Cargá jugadores primero'); return; }
  const nombres = S.state.jugadores.map(j=>j.nombre).filter(n=>n);
  // Shuffle
  for(let i=nombres.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nombres[i],nombres[j]]=[nombres[j],nombres[i]];}
  S.tri.parejas = [[nombres[0]||'',nombres[1]||''],[nombres[2]||'',nombres[3]||''],[nombres[4]||'',nombres[5]||'']];
  guardarTri();
  renderTab();
}

function triIniciar(){
  const p = S.tri.parejas;
  if(p.some(par=>!par[0].trim()||!par[1].trim())){toast('Completá los 6 jugadores');return;}
  S.tri.estado = 'jugando';
  guardarTri();
  renderTab();
  toast('🔺 Triangular iniciado');
}

function triReset(){
  if(!confirm('¿Reiniciar el triangular?')) return;
  S.tri = triEstadoInicial();
  guardarTri();
  renderTab();
}

function triPunto(partidoIdx, quien){
  // quien: 0=pA, 1=pB
  const pt = S.tri.partidos[partidoIdx];
  if(pt.ganador !== null) return;

  // Guardar historial para deshacer
  pt.historial.push({puntos:[...pt.puntos],juegos:[...pt.juegos],ganador:pt.ganador});

  pt.puntos[quien]++;
  const pA = pt.puntos[0], pB = pt.puntos[1];
  const esDeuce = pA >= 3 && pB >= 3;

  let ganoJuego = false;
  if(!esDeuce){
    // Sin deuce: gana si llega a 4 puntos (40 + 1)
    if(pt.puntos[quien] >= 4){
      ganoJuego = true;
    }
  } else {
    // En deuce: necesita 2 de ventaja
    if(Math.abs(pA - pB) >= 2){
      ganoJuego = pA > pB ? true : true;
      quien = pA > pB ? 0 : 1;
    }
  }

  if(ganoJuego){
    pt.juegos[quien]++;
    pt.puntos = [0,0];
    const jA = pt.juegos[0], jB = pt.juegos[1];

    // ¿Ganó el set?
    let ganoSet = false;
    if(jA >= 6 && jA - jB >= 2) ganoSet = true;
    else if(jB >= 6 && jB - jA >= 2) ganoSet = true;
    else if(jA === 7 || jB === 7) ganoSet = true; // tie-break

    if(ganoSet){
      pt.ganador = jA > jB ? 0 : 1;
      // Verificar si terminó el triangular
      const todosTerminados = S.tri.partidos.every(p=>p.ganador!==null);
      if(todosTerminados) S.tri.estado = 'finalizado';
    }
  }

  guardarTri();
  renderTab();
}

function triDeshacerPunto(partidoIdx){
  const pt = S.tri.partidos[partidoIdx];
  if(!pt.historial.length) return;
  const prev = pt.historial.pop();
  pt.puntos = prev.puntos;
  pt.juegos = prev.juegos;
  pt.ganador = prev.ganador;
  if(S.tri.estado === 'finalizado') S.tri.estado = 'jugando';
  guardarTri();
  renderTab();
}

// Restaurar keep-alive al recargar
try{ S.keepAlive = localStorage.getItem('ka')==='true'; }catch(e){}
try{ S.tri = cargarTri(); }catch(e){}

connectWS();

// Restaurar estado UI al cargar
setTimeout(()=>{
  if(S.keepAlive) _aplicarKeepAlive();
  restaurarModos();
}, 500);
</script>
